<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Race 1</title>
<style>
html,body{margin:0;height:100%;background:#0f1115;overflow:hidden;font-family:system-ui}
canvas{display:block;margin:auto;background:#5aa36f}
</style>
</head>
<body>
<canvas id="game" width="960" height="540"></canvas>
<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");
ctx.imageSmoothingEnabled=false;

let selected="wheat";
let unlocked=2;

const crops={
wheat:{grow:6000,yield:2,color:"#e7c45b"},
carrot:{grow:7000,yield:2,color:"#f08a3c"},
beet:{grow:8000,yield:2,color:"#c94b7b"}
};

const plots=[];
for(let i=0;i<6;i++){
plots.push({x:260+(i%3)*150,y:250+Math.floor(i/3)*150,w:120,h:120,crop:null,time:0});
}

function drawVillage(){
ctx.fillStyle="#caa66a";
ctx.fillRect(0,150,960,80);
ctx.fillStyle="#1e6aa8";
ctx.fillRect(650,60,250,130);
ctx.fillStyle="#2aa7d6";
ctx.fillRect(660,70,230,110);

ctx.fillStyle="#2b2d33";
ctx.fillRect(40,60,180,120);
ctx.fillStyle="#c94b7b";
ctx.fillRect(50,70,160,30);
ctx.fillStyle="#fff";
ctx.fillText("Scheune",70,90);

ctx.fillStyle="#2b2d33";
ctx.fillRect(720,200,200,130);
ctx.fillStyle="#e7c45b";
ctx.fillRect(730,210,180,30);
ctx.fillStyle="#000";
ctx.fillText("Shop",790,230);
}

function drawPlots(){
plots.forEach((p,i)=>{
ctx.fillStyle=i<unlocked?"#3b2c1c":"#222";
ctx.fillRect(p.x,p.y,p.w,p.h);

if(i>=unlocked){
ctx.fillStyle="#aaa";
ctx.fillText("LOCK",p.x+40,p.y+60);
return;
}

if(p.crop){
let dt=Date.now()-p.time;
let frac=Math.min(dt/crops[p.crop].grow,1);
ctx.fillStyle=crops[p.crop].color;
ctx.fillRect(p.x+40,p.y+40,40,40);
if(frac>=1){
ctx.fillStyle="#63d27a";
ctx.fillText("READY",p.x+30,p.y+20);
}
}
});
}

canvas.addEventListener("click",e=>{
let rect=canvas.getBoundingClientRect();
let x=(e.clientX-rect.left)*(960/rect.width);
let y=(e.clientY-rect.top)*(540/rect.height);

plots.forEach((p,i)=>{
if(x>p.x&&x<p.x+p.w&&y>p.y&&y<p.y+p.h){
if(i>=unlocked)return;
if(!p.crop){
p.crop=selected;
p.time=Date.now();
}else{
let dt=Date.now()-p.time;
if(dt>=crops[p.crop].grow){
p.crop=null;
}
}
}
});
});

function loop(){
ctx.clearRect(0,0,960,540);
drawVillage();
drawPlots();
requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
