<body>
<div id="game">
<div class="menu" id="menu">
<h1 style="text-align:center">Küken Jump</h1>
<div style="display:flex;flex-direction:column;gap:10px;padding:20px">
<button onclick="start()">Spielen</button>
<button onclick="alert('Shop coming')">Skins</button>
</div>
</div>
<canvas id="c" width="400" height="700"></canvas>
</div>

<script>
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
let y=600,vy=0;
let running=false;

function start(){
document.getElementById('menu').style.display='none';
running=true;
loop();
}

function loop(){
if(!running)return;
ctx.clearRect(0,0,400,700);
vy+=0.5;
y+=vy;
if(y>650){vy=-10}
ctx.fillStyle='yellow';
ctx.beginPath();
ctx.arc(200,y,20,0,Math.PI*2);
ctx.fill();
requestAnimationFrame(loop);
}
</script>
</body>
