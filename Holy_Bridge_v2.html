<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>Holy Bridge</title>
<style>
  html,body{margin:0;height:100%;background:#1c1a24;font-family:system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,Cantarell,Noto Sans,sans-serif;overflow:hidden}
  #wrap{position:fixed;inset:0}
  canvas{position:absolute;inset:0;width:100%;height:100%;display:block;background:#8f86ab}
  /* Overlay UI that matches the screenshot more closely */
  .topbar{
    position:absolute;left:0;right:0;top:0;height:64px;
    display:flex;align-items:center;justify-content:center;
    pointer-events:none;
  }
  .topbar .left, .topbar .right{
    position:absolute;top:8px;display:flex;gap:10px;align-items:center;
    pointer-events:auto;
  }
  .topbar .left{left:10px}
  .topbar .right{right:10px}
  .iconbtn{
    width:38px;height:38px;border-radius:10px;
    background:rgba(40,38,55,.55);
    border:1px solid rgba(255,255,255,.16);
    display:grid;place-items:center;
    color:#f4f4fb;
    cursor:pointer;user-select:none;
    box-shadow:0 6px 18px rgba(0,0,0,.18);
    pointer-events:auto;
  }
  .iconbtn:active{transform:translateY(1px)}
  .midicons{
    display:flex;gap:12px;align-items:center;
    background:rgba(40,38,55,.35);
    border:1px solid rgba(255,255,255,.12);
    padding:8px 12px;border-radius:12px;
    box-shadow:0 6px 18px rgba(0,0,0,.12);
    pointer-events:auto;
  }
  .midicons .tool{width:34px;height:34px;border-radius:10px;
    background:rgba(20,18,30,.35);
    border:1px solid rgba(255,255,255,.12);
    display:grid;place-items:center;
    cursor:pointer;user-select:none;
  }
  .midicons .tool.active{outline:2px solid rgba(255,255,255,.28)}
  .budget{
    position:absolute;top:4px;left:50%;transform:translateX(-50%);
    text-align:center;pointer-events:none;
    font-weight:900;letter-spacing:.3px;
    text-shadow:0 2px 10px rgba(0,0,0,.35);
  }
  .budget .now{color:#62ff76;font-size:26px;line-height:26px}
  .budget .cap{color:#ffe35c;font-size:14px;margin-top:2px}
  .title{
    position:absolute;top:82px;left:50%;transform:translateX(-50%);
    font-size:54px;font-weight:1000;letter-spacing:3px;
    color:#ffffff;opacity:.92;
    text-shadow:0 8px 22px rgba(0,0,0,.28);
    pointer-events:none;
  }
  .bottombar{
    position:absolute;left:0;right:0;bottom:0;
    display:flex;justify-content:center;
    padding:10px 12px 14px;
    pointer-events:none;
  }
  .bar{
    pointer-events:auto;
    display:flex;gap:10px;align-items:center;flex-wrap:wrap;justify-content:center;
    background:rgba(22,20,30,.72);
    border:1px solid rgba(255,255,255,.14);
    border-radius:14px;padding:10px 10px;
    box-shadow:0 10px 26px rgba(0,0,0,.25);
    backdrop-filter: blur(4px);
  }
  .mat{
    min-width:120px;
    padding:10px 12px;border-radius:12px;
    border:1px solid rgba(255,255,255,.14);
    background:rgba(42,40,58,.65);
    cursor:pointer;color:#fff;font-weight:900;
    display:flex;align-items:center;justify-content:space-between;gap:10px;
  }
  .mat .sw{width:18px;height:18px;border-radius:6px;border:1px solid rgba(255,255,255,.22)}
  .mat.active{outline:2px solid rgba(255,211,77,.95)}
  .toast{
    position:absolute;left:50%;top:140px;transform:translateX(-50%);
    padding:10px 12px;border-radius:12px;
    background:rgba(18,16,26,.82);
    border:1px solid rgba(255,255,255,.14);
    color:#fff;font-weight:800;
    box-shadow:0 10px 26px rgba(0,0,0,.25);
    display:none;pointer-events:none;
  }
  .hint{
    position:absolute;left:12px;bottom:86px;
    padding:10px 12px;border-radius:12px;
    background:rgba(18,16,26,.70);
    border:1px solid rgba(255,255,255,.14);
    color:#fff;font-weight:700;
    box-shadow:0 10px 26px rgba(0,0,0,.25);
    max-width:min(520px,calc(100vw - 24px));
  }
  kbd{
    background:rgba(255,255,255,.12);
    border:1px solid rgba(255,255,255,.18);
    padding:2px 6px;border-radius:7px;
    font-weight:900;font-size:.95em;
  }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="c"></canvas>

  <div class="budget">
    <div class="now" id="budgetNow">$0</div>
    <div class="cap" id="budgetCap">Budget: $0</div>
  </div>

  <div class="topbar">
    <div class="left">
      <div class="iconbtn" id="helpBtn" title="Help">?</div>
    </div>

    <div class="midicons" id="midtools" title="Tools (look only)">
      <div class="tool active" data-tool="grid">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <path d="M2 2h14v14H2z" stroke="rgba(255,255,255,.9)" stroke-width="1.6"/>
          <path d="M2 7h14M2 12h14M7 2v14M12 2v14" stroke="rgba(255,255,255,.55)" stroke-width="1.2"/>
        </svg>
      </div>
      <div class="tool" data-tool="snap">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <path d="M3 9h12" stroke="rgba(255,255,255,.9)" stroke-width="1.6" stroke-linecap="round"/>
          <path d="M9 3v12" stroke="rgba(255,255,255,.55)" stroke-width="1.2" stroke-linecap="round"/>
          <circle cx="9" cy="9" r="3.2" stroke="rgba(255,255,255,.9)" stroke-width="1.4"/>
        </svg>
      </div>
      <div class="tool" data-tool="beam">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <path d="M3 14L14 3" stroke="rgba(255,255,255,.9)" stroke-width="1.8" stroke-linecap="round"/>
          <circle cx="3" cy="14" r="2" fill="rgba(255,255,255,.85)"/>
          <circle cx="14" cy="3" r="2" fill="rgba(255,255,255,.55)"/>
        </svg>
      </div>
      <div class="tool" data-tool="camera">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <path d="M3 6h12v9H3z" stroke="rgba(255,255,255,.9)" stroke-width="1.6"/>
          <path d="M6 6l1-2h4l1 2" stroke="rgba(255,255,255,.55)" stroke-width="1.2"/>
          <circle cx="9" cy="10.5" r="2.3" stroke="rgba(255,255,255,.9)" stroke-width="1.2"/>
        </svg>
      </div>
    </div>

    <div class="right">
      <div class="iconbtn" id="undoBtn" title="Undo">↺</div>
      <div class="iconbtn" id="redoBtn" title="Redo">↻</div>
      <div class="iconbtn" id="trashBtn" title="Reset">🗑</div>
    </div>
  </div>

  <div class="title">HOLY BRIDGE</div>

  <div class="toast" id="toast"></div>

  <div class="bottombar">
    <div class="bar" id="matBar">
      <div class="mat active" data-mat="ROAD"><span>Road</span><span class="sw" style="background:#3a2a1f"></span></div>
      <div class="mat" data-mat="WOOD"><span>Wood</span><span class="sw" style="background:#d6b26b"></span></div>
      <div class="mat" data-mat="STEEL"><span>Steel</span><span class="sw" style="background:#cfd6df"></span></div>
      <div class="mat" data-mat="CABLE"><span>Cable</span><span class="sw" style="background:#89c7ff"></span></div>
    </div>
  </div>

  <div class="hint">
    <div style="margin-bottom:6px;opacity:.95">Build-Phase:</div>
    <div>• Klick: Node setzen (32px Raster) &nbsp; • Klick Node→Node: Verbindung</div>
    <div>• <kbd>Shift</kbd>+Klick Verbindung: Löschen &nbsp; • <kbd>Del</kbd>: Node löschen</div>
    <div>• Ziehen: Node verschieben &nbsp; • ▶ startet Simulation</div>
  </div>
</div>

<script>
/* ============================================================
   Holy Bridge — single-file offline build (look + feel like ref)
   Modules: LevelSystem, Physics, Rendering, UI
   ============================================================ */
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const lerp=(a,b,t)=>a+(b-a)*t;
const dist=(ax,ay,bx,by)=>Math.hypot(ax-bx,ay-by);
const GRID=32;

const DT=1/60;
const SUBSTEPS=2;
const CONSTRAINT_ITERS=10;
const DAMPING=0.996;
const GRAVITY=1200;

const Materials = {
  ROAD:  { name:"ROAD",  cost: 1.20, t:0.30, c:0.26, color:"#3a2a1f", width:12, driveable:true,  tensionOnly:false },
  WOOD:  { name:"WOOD",  cost: 0.70, t:0.22, c:0.18, color:"#d6b26b", width:7,  driveable:false, tensionOnly:false },
  STEEL: { name:"STEEL", cost: 1.60, t:0.46, c:0.40, color:"#cfd6df", width:7,  driveable:false, tensionOnly:false },
  CABLE: { name:"CABLE", cost: 0.90, t:0.34, c:999,  color:"#89c7ff", width:3,  driveable:false, tensionOnly:true  },
};

const Vehicles = {
  Car:    { wheelRadius:14, axleLength:64, wheelMass:1.2, chassisMass:1.6, engineForce: 820 },
  Pickup: { wheelRadius:15, axleLength:70, wheelMass:1.4, chassisMass:2.1, engineForce: 880 },
  Van:    { wheelRadius:16, axleLength:76, wheelMass:1.6, chassisMass:2.6, engineForce: 920 },
  Bus:    { wheelRadius:18, axleLength:86, wheelMass:2.2, chassisMass:3.8, engineForce: 980 },
  Truck:  { wheelRadius:20, axleLength:94, wheelMass:2.8, chassisMass:5.2, engineForce: 1040 },
};

const LevelSystem = (()=>{
  function makeLevels(){
    const names = Object.keys(Vehicles);
    const levels=[];
    for(let i=1;i<=20;i++){
      const t=(i-1)/19;
      const gap = Math.round( (520 + 520*t) / GRID )*GRID;
      const leftY = Math.round( (400 - 80*t + (i%3===0? -20:0)) / GRID )*GRID;
      const rightY = Math.round( (400 - 80*t + (i%4===0?  20:0)) / GRID )*GRID;
      const budget = Math.round( 10000 - 3200*t + (i<=3? 1200:0) + (i%5===0? -900:0) );
      const vehicleType = names[ clamp(Math.floor(t*names.length),0,names.length-1) ];
      const multiGoal = (i>=12 && i%4===0);
      const goals = multiGoal ? [{},{},] : [{}];
      levels.push({ id:i, budget, startAnchor:{}, goalAnchors:goals, voidZone:{y: 690}, vehicleType, gap, leftY, rightY });
    }
    return levels;
  }
  const levels=makeLevels(); let idx=0;
  return { current:()=>levels[idx], setIndex:(i)=>levels[idx=clamp(i,0,levels.length-1)], next:()=>levels[idx=clamp(idx+1,0,levels.length-1)], prev:()=>levels[idx=clamp(idx-1,0,levels.length-1)], index:()=>idx, count:()=>levels.length };
})();

const Physics = (()=>{
  let nodeId=1, memberId=1;
  function newNode(x,y, invMass=1, isFixed=false){
    return { id: nodeId++, x,y, previousX:x, previousY:y, accelerationX:0, accelerationY:0, inverseMass:invMass, radius:8, isFixed };
  }
  function newMember(a,b, mat){
    const L=Math.hypot(b.x-a.x,b.y-a.y)||1;
    return { id: memberId++, nodeA:a.id, nodeB:b.id, restLength:L, materialType:mat, broken:false, strain:0 };
  }
  function deepCloneState(s){ return JSON.parse(JSON.stringify(s)); }
  function rebuildRuntimeRefs(state){
    state.nodeMap=new Map(state.nodes.map(n=>[n.id,n]));
    state.memberMap=new Map(state.members.map(m=>[m.id,m]));
  }
  function applyForces(state){
    for(const n of state.nodes){
      if(n.isFixed || n.inverseMass===0) continue;
      n.accelerationX=0; n.accelerationY=GRAVITY;
    }
  }
  function verletIntegrate(state, dt){
    const dt2=dt*dt;
    for(const n of state.nodes){
      if(n.isFixed || n.inverseMass===0) continue;
      const vx=(n.x-n.previousX)*DAMPING;
      const vy=(n.y-n.previousY)*DAMPING;
      const nx=n.x+vx+n.accelerationX*dt2;
      const ny=n.y+vy+n.accelerationY*dt2;
      n.previousX=n.x; n.previousY=n.y;
      n.x=nx; n.y=ny;
    }
  }
  function satisfyConstraints(state){
    for(let it=0; it<CONSTRAINT_ITERS; it++){
      for(const m of state.members){
        if(m.broken) continue;
        const a=state.nodeMap.get(m.nodeA), b=state.nodeMap.get(m.nodeB);
        if(!a||!b) continue;
        const dx=b.x-a.x, dy=b.y-a.y;
        const L=Math.hypot(dx,dy)||1;
        const mat=Materials[m.materialType];
        const strain=(L-m.restLength)/m.restLength;
        m.strain=strain;

        if(mat.tensionOnly && strain<0) continue;

        const diff=(L-m.restLength)/L;
        const imA=(a.isFixed?0:a.inverseMass), imB=(b.isFixed?0:b.inverseMass);
        const sum=imA+imB; if(sum===0) continue;
        const k=0.92;
        const cx=dx*diff*k, cy=dy*diff*k;
        a.x += cx*(imA/sum)*-1; a.y += cy*(imA/sum)*-1;
        b.x += cx*(imB/sum)* 1; b.y += cy*(imB/sum)* 1;

        if(!m._vehicle && (strain>mat.t || strain<-mat.c)) m.broken=true;
      }
    }
  }

  function roadSegments(state){
    const segs=[];
    for(const m of state.members){
      if(m.broken) continue;
      const mat=Materials[m.materialType];
      if(!mat.driveable) continue;
      const a=state.nodeMap.get(m.nodeA), b=state.nodeMap.get(m.nodeB);
      if(a&&b) segs.push({a,b,m});
    }
    return segs;
  }
  function closestPointOnSeg(px,py, ax,ay,bx,by){
    const abx=bx-ax, aby=by-ay, apx=px-ax, apy=py-ay;
    const ab2=abx*abx+aby*aby||1;
    let t=(apx*abx+apy*aby)/ab2; t=clamp(t,0,1);
    return {x:ax+abx*t,y:ay+aby*t,t};
  }
  function solveWheelOnRoad(state, wheel, radius){
    const segs = state._roadSegs || (state._roadSegs = roadSegments(state));
    let best=null;
    for(const s of segs){
      const p=closestPointOnSeg(wheel.x,wheel.y, s.a.x,s.a.y, s.b.x,s.b.y);
      const dy = wheel.y - p.y;
      if(dy < -2) continue;
      const d = Math.hypot(wheel.x-p.x, wheel.y-p.y);
      if(!best || d<best.d) best={d,p,s};
    }
    if(!best) return {grounded:false};
    if(best.d < radius+2){
      const dx=wheel.x-best.p.x, dy=wheel.y-best.p.y;
      const len=Math.hypot(dx,dy)||1;
      const nx=dx/len, ny=dy/len;
      const push=(radius+2-best.d);
      wheel.x += nx*push; wheel.y += ny*push;
      return {grounded:true,nx,ny};
    }
    return {grounded:false};
  }

  return { newNode,newMember,deepCloneState,rebuildRuntimeRefs,applyForces,verletIntegrate,satisfyConstraints,solveWheelOnRoad };
})();

const Rendering = (()=>{
  let canvas, ctx;

  function setCanvas(c){
    canvas=c; ctx=canvas.getContext("2d");
    resize();
  }
  function resize(){
    const dpr=Math.max(1,Math.min(2,window.devicePixelRatio||1));
    canvas.width=Math.floor(canvas.clientWidth*dpr);
    canvas.height=Math.floor(canvas.clientHeight*dpr);
    ctx.setTransform(dpr,0,0,dpr,0,0);
  }

  function mix(a,b,t){
    function h2r(h){h=h.replace("#",""); if(h.length===3)h=h.split("").map(c=>c+c).join(""); const n=parseInt(h,16); return [(n>>16)&255,(n>>8)&255,n&255];}
    const A=h2r(a), B=h2r(b);
    const r=Math.round(lerp(A[0],B[0],t)), g=Math.round(lerp(A[1],B[1],t)), bb=Math.round(lerp(A[2],B[2],t));
    return `rgb(${r},${g},${bb})`;
  }
  function stressColor(strain){
    const a=Math.abs(strain);
    if(a<0.07) return "#57ff85";
    if(a<0.13) return "#ffe35c";
    if(a<0.20) return "#ff9b3b";
    return "#ff3b3b";
  }

  function drawBackground(state){
    const w=canvas.clientWidth, h=canvas.clientHeight;
    // base purple like reference
    ctx.fillStyle="#8f86ab";
    ctx.fillRect(0,0,w,h);

    // subtle gradient
    const g=ctx.createLinearGradient(0,0,0,h);
    g.addColorStop(0,"rgba(255,255,255,0.10)");
    g.addColorStop(1,"rgba(0,0,0,0.16)");
    ctx.fillStyle=g; ctx.fillRect(0,0,w,h);

    // grid
    ctx.save();
    ctx.strokeStyle="rgba(255,255,255,0.10)";
    ctx.lineWidth=1;
    for(let x=0;x<w;x+=GRID){ ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,h); ctx.stroke(); }
    for(let y=0;y<h;y+=GRID){ ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(w,y); ctx.stroke(); }
    ctx.strokeStyle="rgba(255,255,255,0.14)";
    for(let x=0;x<w;x+=GRID*5){ ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,h); ctx.stroke(); }
    for(let y=0;y<h;y+=GRID*5){ ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(w,y); ctx.stroke(); }
    ctx.restore();

    drawCliffs(state);
    drawBottomBand(state);
  }

  function drawBottomBand(state){
    const w=canvas.clientWidth, h=canvas.clientHeight;
    // darker bands like ref
    ctx.save();
    ctx.globalAlpha=0.18;
    ctx.fillStyle="#0a0910";
    ctx.fillRect(0,h-250,w,250);
    ctx.globalAlpha=0.22;
    ctx.fillRect(0,h-120,w,120);
    ctx.restore();
  }

  function drawTree(x,y,scale=1){
    ctx.save();
    ctx.translate(x,y);
    ctx.scale(scale,scale);
    ctx.globalAlpha=0.55;
    ctx.fillStyle="rgba(220,220,235,0.55)";
    // stylized layered pine
    ctx.beginPath();
    ctx.moveTo(0,-140); ctx.lineTo(-40,-90); ctx.lineTo(-12,-90);
    ctx.lineTo(-55,-40); ctx.lineTo(-18,-40);
    ctx.lineTo(-65,10); ctx.lineTo(65,10);
    ctx.lineTo(18,-40); ctx.lineTo(55,-40);
    ctx.lineTo(12,-90); ctx.lineTo(40,-90);
    ctx.closePath();
    ctx.fill();
    // trunk
    ctx.globalAlpha=0.35;
    ctx.fillStyle="rgba(40,38,55,0.65)";
    ctx.fillRect(-10,10,20,42);
    ctx.restore();
  }

  function drawCliffs(state){
    const w=canvas.clientWidth, h=canvas.clientHeight;
    const L=state.levelLayout.leftX;
    const R=state.levelLayout.rightX;
    const Ly=state.levelLayout.leftY;
    const Ry=state.levelLayout.rightY;

    // left rock mass
    ctx.save();
    const gradL=ctx.createLinearGradient(0,0,0,h);
    gradL.addColorStop(0,"rgba(70,66,88,0.60)");
    gradL.addColorStop(1,"rgba(25,22,32,0.78)");
    ctx.fillStyle=gradL;
    ctx.beginPath();
    ctx.moveTo(0,0);
    ctx.lineTo(L-140,0);
    ctx.lineTo(L-40,Ly-140);
    ctx.lineTo(L,Ly);
    ctx.lineTo(L,h);
    ctx.lineTo(0,h);
    ctx.closePath();
    ctx.fill();

    // right rock mass
    const gradR=ctx.createLinearGradient(0,0,0,h);
    gradR.addColorStop(0,"rgba(70,66,88,0.60)");
    gradR.addColorStop(1,"rgba(25,22,32,0.78)");
    ctx.fillStyle=gradR;
    ctx.beginPath();
    ctx.moveTo(w,0);
    ctx.lineTo(R+140,0);
    ctx.lineTo(R+40,Ry-140);
    ctx.lineTo(R,Ry);
    ctx.lineTo(R,h);
    ctx.lineTo(w,h);
    ctx.closePath();
    ctx.fill();

    // ledges
    ctx.fillStyle="rgba(20,18,28,0.75)";
    ctx.fillRect(L-140, Ly, 140, 16);
    ctx.fillRect(R, Ry, 140, 16);

    // letter A markers
    drawAMarker(L-110, Ly-66);
    drawAMarker(R+110, Ry-66);

    // decorative tree like ref on left
    drawTree(L-85, Ly-10, 1.05);

    ctx.restore();
  }

  function drawAMarker(x,y){
    ctx.save();
    ctx.globalAlpha=0.88;
    ctx.fillStyle="rgba(0,0,0,0.25)";
    ctx.fillRect(x-18,y-28,36,56);
    ctx.fillStyle="#ffffff";
    ctx.font="bold 44px system-ui, sans-serif";
    ctx.textAlign="center"; ctx.textBaseline="middle";
    ctx.fillText("A", x, y);
    ctx.restore();
  }

  function drawMembers(state){
    for(const m of state.members){
      if(m.broken) continue;
      const a=state.nodeMap.get(m.nodeA), b=state.nodeMap.get(m.nodeB);
      if(!a||!b) continue;
      const mat=Materials[m.materialType];
      ctx.lineCap="round"; ctx.lineJoin="round";
      ctx.lineWidth=mat.width;
      const base=mat.color;
      const sCol=stressColor(m.strain);
      const t=clamp(Math.abs(m.strain)/Math.max(0.22,mat.t),0,1);
      ctx.strokeStyle=mix(base,sCol,t*0.85);
      ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.stroke();
    }
  }

  function drawNodes(state){
    for(const n of state.nodes){
      // anchors: red square like ref
      if(n.isFixed){
        ctx.save();
        ctx.fillStyle="#c83a3a";
        ctx.strokeStyle="rgba(0,0,0,.35)";
        ctx.lineWidth=2;
        const s=20;
        ctx.fillRect(n.x-s/2,n.y-s/2,s,s);
        ctx.strokeRect(n.x-s/2,n.y-s/2,s,s);
        ctx.restore();
        continue;
      }
      ctx.beginPath();
      ctx.fillStyle="#ffe85c";
      ctx.strokeStyle="rgba(0,0,0,.35)";
      ctx.lineWidth=2;
      ctx.arc(n.x,n.y, n.radius, 0, Math.PI*2);
      ctx.fill(); ctx.stroke();
    }
  }

  function drawVehicleDecor(state){
    // static blue car on left ledge during build (like screenshot)
    if(state.phase!=="build") return;
    const start=state.nodeMap.get(state.level.startAnchor.id);
    if(!start) return;
    const x=start.x-90, y=start.y-18;
    ctx.save();
    ctx.globalAlpha=0.95;
    // body
    ctx.fillStyle="rgba(120,190,255,0.95)";
    ctx.strokeStyle="rgba(0,0,0,0.35)";
    ctx.lineWidth=3;
    roundRect(x,y,96,26,10); ctx.fill(); ctx.stroke();
    // roof
    ctx.fillStyle="rgba(120,190,255,0.95)";
    roundRect(x+18,y-14,54,18,10); ctx.fill(); ctx.stroke();
    // windows
    ctx.fillStyle="rgba(20,30,50,0.35)";
    roundRect(x+26,y-10,18,12,6); ctx.fill();
    roundRect(x+48,y-10,18,12,6); ctx.fill();
    // wheels
    ctx.fillStyle="rgba(220,230,245,0.95)";
    ctx.strokeStyle="rgba(0,0,0,0.35)";
    ctx.lineWidth=3;
    ctx.beginPath(); ctx.arc(x+24,y+26,12,0,Math.PI*2); ctx.fill(); ctx.stroke();
    ctx.beginPath(); ctx.arc(x+72,y+26,12,0,Math.PI*2); ctx.fill(); ctx.stroke();
    ctx.restore();

    function roundRect(x,y,w,h,r){
      ctx.beginPath();
      ctx.moveTo(x+r,y);
      ctx.arcTo(x+w,y,x+w,y+h,r);
      ctx.arcTo(x+w,y+h,x,y+h,r);
      ctx.arcTo(x,y+h,x,y,r);
      ctx.arcTo(x,y,x+w,y,r);
      ctx.closePath();
    }
  }

  function drawVehicleSim(state){
    if(!state.vehicle) return;
    const v=state.vehicle;
    const wl=v.wL, wr=v.wR, ch=v.ch;
    ctx.save();
    ctx.lineWidth=3;
    ctx.strokeStyle="rgba(0,0,0,.35)";
    ctx.fillStyle="rgba(225,235,250,.95)";
    for(const w of [wl,wr]){
      ctx.beginPath(); ctx.arc(w.x,w.y, v.spec.wheelRadius, 0, Math.PI*2); ctx.fill(); ctx.stroke();
      ctx.fillStyle="rgba(0,0,0,.28)";
      ctx.beginPath(); ctx.arc(w.x,w.y, 4, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle="rgba(225,235,250,.95)";
    }
    // chassis body
    const cx=(wl.x+wr.x)/2, cy=(wl.y+wr.y)/2 - v.spec.wheelRadius - 10;
    const bw=Math.hypot(wr.x-wl.x, wr.y-wl.y)+30, bh=24;
    ctx.fillStyle="rgba(120,190,255,.95)";
    ctx.strokeStyle="rgba(0,0,0,.35)";
    ctx.lineWidth=3;
    roundRect(cx-bw/2, cy-bh/2, bw, bh, 10); ctx.fill(); ctx.stroke();
    ctx.fillStyle="rgba(20,30,50,0.35)";
    roundRect(cx-bw*0.15, cy-bh*0.45, bw*0.30, bh*0.65, 8); ctx.fill();

    ctx.restore();

    function roundRect(x,y,w,h,r){
      r=Math.min(r,w/2,h/2);
      ctx.beginPath();
      ctx.moveTo(x+r,y);
      ctx.arcTo(x+w,y,x+w,y+h,r);
      ctx.arcTo(x+w,y+h,x,y+h,r);
      ctx.arcTo(x,y+h,x,y,r);
      ctx.arcTo(x,y,x+w,y,r);
      ctx.closePath();
    }
  }

  function drawGhost(state){
    if(!state.editor.ghost) return;
    const g=state.editor.ghost;
    ctx.save();
    ctx.globalAlpha=0.55;
    ctx.fillStyle="rgba(255,255,255,.9)";
    ctx.strokeStyle="rgba(0,0,0,.25)";
    ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(g.x,g.y, 8, 0, Math.PI*2); ctx.fill(); ctx.stroke();
    ctx.restore();
  }

  function render(state){
    drawBackground(state);
    drawMembers(state);
    drawVehicleDecor(state);
    drawVehicleSim(state);
    drawNodes(state);
    drawGhost(state);

    // build helper line
    if(state.phase==="build" && state.editor.selectedNodeId && state.editor.mouse){
      const a=state.nodeMap.get(state.editor.selectedNodeId);
      const m=state.editor.mouse;
      if(a){
        ctx.save();
        ctx.globalAlpha=0.45;
        ctx.strokeStyle=Materials[state.editor.currentMaterial].color;
        ctx.lineWidth=4;
        ctx.setLineDash([8,8]);
        ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(m.x,m.y); ctx.stroke();
        ctx.restore();
      }
    }
  }

  return { setCanvas, resize, render };
})();

const UI = (()=>{
  const els={
    canvas:document.getElementById("c"),
    toast:document.getElementById("toast"),
    matBar:document.getElementById("matBar"),
    budgetNow:document.getElementById("budgetNow"),
    budgetCap:document.getElementById("budgetCap"),
    undoBtn:document.getElementById("undoBtn"),
    redoBtn:document.getElementById("redoBtn"),
    trashBtn:document.getElementById("trashBtn"),
    helpBtn:document.getElementById("helpBtn"),
  };
  let toastTimer=null;
  function toast(msg){
    els.toast.textContent=msg;
    els.toast.style.display="block";
    clearTimeout(toastTimer);
    toastTimer=setTimeout(()=>els.toast.style.display="none", 1500);
  }
  function setMaterialActive(mat){
    for(const el of els.matBar.querySelectorAll(".mat")){
      el.classList.toggle("active", el.dataset.mat===mat);
    }
  }
  function updateBudget(state){
    els.budgetNow.textContent = "$"+String(Math.max(0,Math.round(state.budgetRemaining)));
    els.budgetCap.textContent = "Budget: $"+String(Math.round(state.level.budget));
  }
  return {els,toast,setMaterialActive,updateBudget};
})();

function memberCost(a,b,mat){
  const L=Math.hypot(b.x-a.x,b.y-a.y);
  const m=Materials[mat];
  return (L/GRID)*m.cost*100;
}

function createInitialState(level){
  const canvas=UI.els.canvas;
  const w=canvas.clientWidth, h=canvas.clientHeight;

  const centerX=w*0.5;
  const leftX = Math.round((centerX - level.gap/2)/GRID)*GRID;
  const rightX= Math.round((centerX + level.gap/2)/GRID)*GRID;

  const leftY = clamp(level.leftY, 240, 500);
  const rightY= clamp(level.rightY, 240, 500);

  const state={
    phase:"build",
    level,
    budgetRemaining: level.budget,
    nodes:[],
    members:[],
    nodeMap:new Map(),
    memberMap:new Map(),
    vehicle:null,
    editor:{ currentMaterial:"WOOD", selectedNodeId:null, ghost:null, mouse:null },
    undoStack:[], redoStack:[],
    _roadSegs:null,
    levelLayout:{ leftX,rightX,leftY,rightY }
  };

  const start=Physics.newNode(leftX, leftY, 0, true);
  const goal1=Physics.newNode(rightX,rightY,0,true);
  state.nodes.push(start,goal1);

  // optional second goal above
  if(level.goalAnchors.length>1){
    const goal2=Physics.newNode(rightX,rightY-96,0,true);
    state.nodes.push(goal2);
  }

  // starting road base beam (like ref bottom road)
  const deckY=Math.round(((leftY+rightY)/2)/GRID)*GRID;
  const deckL=Physics.newNode(leftX+GRID*2, deckY, 1, false);
  const deckR=Physics.newNode(rightX-GRID*2, deckY, 1, false);
  state.nodes.push(deckL,deckR);
  state.members.push(Physics.newMember(start, deckL, "ROAD"));
  state.members.push(Physics.newMember(deckR, goal1, "ROAD"));

  Physics.rebuildRuntimeRefs(state);

  level.startAnchor.id=start.id; level.startAnchor.x=start.x; level.startAnchor.y=start.y;
  level.goalAnchors[0].id=goal1.id; level.goalAnchors[0].x=goal1.x; level.goalAnchors[0].y=goal1.y;
  if(level.goalAnchors.length>1){
    const g2=state.nodes.find(n=>n.isFixed && n.id!==start.id && n.id!==goal1.id);
    level.goalAnchors[1].id=g2.id; level.goalAnchors[1].x=g2.x; level.goalAnchors[1].y=g2.y;
  }

  return state;
}

function makeVehicle(state){
  const spec=Vehicles[state.level.vehicleType];
  const start=state.nodeMap.get(state.level.startAnchor.id);
  const x0=start.x+GRID*1.3;
  const y0=start.y - spec.wheelRadius - 2;

  const wL=Physics.newNode(x0,y0,1/spec.wheelMass,false);
  const wR=Physics.newNode(x0+spec.axleLength,y0,1/spec.wheelMass,false);
  const ch=Physics.newNode(x0+spec.axleLength/2,y0-(spec.wheelRadius+26),1/spec.chassisMass,false);

  state.nodes.push(wL,wR,ch);

  const vMembers=[
    Physics.newMember(wL,wR,"STEEL"),
    Physics.newMember(wL,ch,"STEEL"),
    Physics.newMember(wR,ch,"STEEL"),
  ];
  for(const m of vMembers){ m._vehicle=true; m.broken=false; }
  state.members.push(...vMembers);

  Physics.rebuildRuntimeRefs(state);
  for(const m of vMembers){
    const a=state.nodeMap.get(m.nodeA), b=state.nodeMap.get(m.nodeB);
    m.restLength=dist(a.x,a.y,b.x,b.y);
  }

  state.vehicle={spec,wL,wR,ch};
}

function game(){
  const canvas=UI.els.canvas;
  Rendering.setCanvas(canvas);

  let state=createInitialState(LevelSystem.current());

  function pushHistory(){
    if(state.phase!=="build") return;
    const snap=Physics.deepCloneState({
      budgetRemaining: state.budgetRemaining,
      nodes: state.nodes,
      members: state.members,
      editor: state.editor,
      levelLayout: state.levelLayout
    });
    state.undoStack.push(snap);
    if(state.undoStack.length>60) state.undoStack.shift();
    state.redoStack.length=0;
  }
  function applySnapshot(snap){
    state.budgetRemaining=snap.budgetRemaining;
    state.nodes=snap.nodes;
    state.members=snap.members;
    state.editor=snap.editor;
    state.levelLayout=snap.levelLayout;
    state.phase="build";
    state.vehicle=null;
    state._roadSegs=null;
    Physics.rebuildRuntimeRefs(state);
  }

  // UI buttons (styled like reference icons)
  UI.els.undoBtn.onclick=()=>{ if(state.undoStack.length===0||state.phase!=="build") return;
    const curr=Physics.deepCloneState({budgetRemaining:state.budgetRemaining,nodes:state.nodes,members:state.members,editor:state.editor,levelLayout:state.levelLayout});
    state.redoStack.push(curr);
    applySnapshot(state.undoStack.pop());
    UI.toast("Undo");
  };
  UI.els.redoBtn.onclick=()=>{ if(state.redoStack.length===0||state.phase!=="build") return;
    const curr=Physics.deepCloneState({budgetRemaining:state.budgetRemaining,nodes:state.nodes,members:state.members,editor:state.editor,levelLayout:state.levelLayout});
    state.undoStack.push(curr);
    applySnapshot(state.redoStack.pop());
    UI.toast("Redo");
  };
  UI.els.trashBtn.onclick=()=>{ state=createInitialState(LevelSystem.current()); UI.setMaterialActive(state.editor.currentMaterial); UI.toast("Reset"); };
  UI.els.helpBtn.onclick=()=>UI.toast("Build: Klick=Node, Node→Node=Beam, Shift+Klick=Delete");

  UI.els.matBar.addEventListener("click",(e)=>{
    const el=e.target.closest(".mat"); if(!el) return;
    if(state.phase!=="build"){ UI.toast("Nur in Build-Phase"); return; }
    state.editor.currentMaterial=el.dataset.mat;
    UI.setMaterialActive(state.editor.currentMaterial);
  });
  UI.setMaterialActive(state.editor.currentMaterial);

  // input
  let dragging=null;
  let dragOff={x:0,y:0};

  function getMouse(ev){
    const r=canvas.getBoundingClientRect();
    return {x:ev.clientX-r.left, y:ev.clientY-r.top};
  }
  function snap(p){ return {x:Math.round(p.x/GRID)*GRID, y:Math.round(p.y/GRID)*GRID}; }
  function findNodeAt(p, rad=14){
    let best=null;
    for(const n of state.nodes){
      const d=Math.hypot(n.x-p.x,n.y-p.y);
      if(d<rad && (!best || d<best.d)) best={n,d};
    }
    return best?best.n:null;
  }
  function findMemberNear(p, thr=8){
    let best=null;
    for(const m of state.members){
      if(m.broken) continue;
      const a=state.nodeMap.get(m.nodeA), b=state.nodeMap.get(m.nodeB);
      if(!a||!b) continue;
      const abx=b.x-a.x, aby=b.y-a.y;
      const apx=p.x-a.x, apy=p.y-a.y;
      const ab2=abx*abx+aby*aby||1;
      let t=(apx*abx+apy*aby)/ab2; t=clamp(t,0,1);
      const cx=a.x+abx*t, cy=a.y+aby*t;
      const d=Math.hypot(p.x-cx,p.y-cy);
      if(d<thr && (!best||d<best.d)) best={m,d};
    }
    return best?best.m:null;
  }

  canvas.addEventListener("mousemove",(ev)=>{
    const p=getMouse(ev);
    state.editor.mouse=p;
    if(state.phase!=="build") return;
    if(dragging){
      const n=state.nodeMap.get(dragging);
      if(n && !n.isFixed){
        const sp=snap({x:p.x-dragOff.x,y:p.y-dragOff.y});
        n.x=sp.x; n.y=sp.y; n.previousX=n.x; n.previousY=n.y;
      }
    }else{
      state.editor.ghost=snap(p);
    }
  });
  window.addEventListener("mouseup",()=>{
    if(dragging){ dragging=null; pushHistory(); }
  });
  canvas.addEventListener("mousedown",(ev)=>{
    if(state.phase!=="build") return;
    const p=getMouse(ev);
    const n=findNodeAt(p);
    if(n && !n.isFixed){
      dragging=n.id;
      dragOff.x=p.x-n.x; dragOff.y=p.y-n.y;
    }
  });

  canvas.addEventListener("click",(ev)=>{
    if(state.phase!=="build") return;
    const p=getMouse(ev);
    if(ev.shiftKey){
      const m=findMemberNear(p);
      if(m && !m._vehicle){
        pushHistory();
        // refund half
        const a=state.nodeMap.get(m.nodeA), b=state.nodeMap.get(m.nodeB);
        state.budgetRemaining += memberCost(a,b,m.materialType)*0.5;
        state.members=state.members.filter(mm=>mm.id!==m.id);
        Physics.rebuildRuntimeRefs(state);
        UI.toast("Beam gelöscht");
      }
      return;
    }

    const node=findNodeAt(p);
    if(node){
      if(state.editor.selectedNodeId && state.editor.selectedNodeId!==node.id){
        const a=state.nodeMap.get(state.editor.selectedNodeId);
        const b=node;
        addMember(a,b,state.editor.currentMaterial);
        state.editor.selectedNodeId=null;
      }else{
        state.editor.selectedNodeId=node.id;
      }
      return;
    }

    const sp=snap(p);
    pushHistory();
    const nn=Physics.newNode(sp.x,sp.y,1,false);
    state.nodes.push(nn);
    Physics.rebuildRuntimeRefs(state);

    if(state.editor.selectedNodeId){
      const a=state.nodeMap.get(state.editor.selectedNodeId);
      addMember(a,nn,state.editor.currentMaterial);
      state.editor.selectedNodeId=null;
    }else{
      state.editor.selectedNodeId=nn.id;
    }
  });

  window.addEventListener("keydown",(ev)=>{
    if(state.phase!=="build") return;
    if(ev.key==="Delete"||ev.key==="Backspace"){
      const id=state.editor.selectedNodeId;
      if(!id) return;
      const n=state.nodeMap.get(id);
      if(n && !n.isFixed){
        pushHistory();
        state.members=state.members.filter(m=>m.nodeA!==id && m.nodeB!==id);
        state.nodes=state.nodes.filter(nn=>nn.id!==id);
        state.editor.selectedNodeId=null;
        Physics.rebuildRuntimeRefs(state);
        UI.toast("Node gelöscht");
      }else{
        UI.toast("Anker nicht löschbar");
      }
    }
    if(ev.key===" "){
      // space toggles sim
      ev.preventDefault();
      if(state.phase==="build") startSim(); else stopSim();
    }
  });

  function addMember(a,b,mat){
    if(!a||!b||a.id===b.id) return;
    for(const m of state.members){
      if((m.nodeA===a.id&&m.nodeB===b.id)||(m.nodeA===b.id&&m.nodeB===a.id)){ UI.toast("Schon verbunden"); return; }
    }
    const cost=memberCost(a,b,mat);
    if(state.budgetRemaining<cost){ UI.toast("Budget zu niedrig"); return; }
    const m=Physics.newMember(a,b,mat);
    state.members.push(m);
    state.budgetRemaining-=cost;
    Physics.rebuildRuntimeRefs(state);
  }

  function startSim(){
    state.phase="sim";
    state.editor.ghost=null;
    state._roadSegs=null;
    for(const n of state.nodes){ n.previousX=n.x; n.previousY=n.y; n.accelerationX=0; n.accelerationY=0; }
    makeVehicle(state);
    UI.toast("▶ Simulation");
  }
  function stopSim(){
    state.phase="build";
    // remove vehicle nodes/members
    if(state.vehicle){
      const ids=new Set([state.vehicle.wL.id,state.vehicle.wR.id,state.vehicle.ch.id]);
      state.members=state.members.filter(m=>!m._vehicle && !ids.has(m.nodeA) && !ids.has(m.nodeB));
      state.nodes=state.nodes.filter(n=>!ids.has(n.id));
      state.vehicle=null;
      Physics.rebuildRuntimeRefs(state);
    }
    UI.toast("■ Stop");
  }

  // click on title area tool panel starts sim (like play button feel)
  document.getElementById("midtools").addEventListener("dblclick",()=>{
    if(state.phase==="build") startSim();
  });

  window.addEventListener("resize",()=>Rendering.resize());

  function step(){
    if(state.phase==="sim") simulate();
    UI.updateBudget(state);
    Rendering.render(state);
    requestAnimationFrame(step);
  }

  function simulate(){
    for(let s=0;s<SUBSTEPS;s++){
      Physics.applyForces(state);

      // drive force
      if(state.vehicle){
        const v=state.vehicle;
        const wl=state.nodeMap.get(v.wL.id), wr=state.nodeMap.get(v.wR.id);
        wl.accelerationX += v.spec.engineForce * wl.inverseMass;
        wr.accelerationX += v.spec.engineForce * wr.inverseMass;
      }

      Physics.verletIntegrate(state, DT/SUBSTEPS);

      // wheel-road contact
      if(state.vehicle){
        const v=state.vehicle;
        const wl=state.nodeMap.get(v.wL.id), wr=state.nodeMap.get(v.wR.id);
        const cl=Physics.solveWheelOnRoad(state, wl, v.spec.wheelRadius);
        const cr=Physics.solveWheelOnRoad(state, wr, v.spec.wheelRadius);
        if(cl.grounded){ wl.previousX=lerp(wl.previousX,wl.x,0.35); wl.previousY=lerp(wl.previousY,wl.y,0.55); }
        if(cr.grounded){ wr.previousX=lerp(wr.previousX,wr.x,0.35); wr.previousY=lerp(wr.previousY,wr.y,0.55); }
      }

      Physics.satisfyConstraints(state);

      // keep in bounds
      const w=canvas.clientWidth, h=canvas.clientHeight;
      for(const n of state.nodes){
        n.x=clamp(n.x,-200,w+200);
        n.y=clamp(n.y,-200,h+300);
      }

      // win/fail: reach right anchor
      if(state.vehicle){
        const goal=state.nodes.find(n=>n.isFixed && n.id!==state.level.startAnchor.id);
        const d=dist(state.vehicle.ch.x,state.vehicle.ch.y, goal.x,goal.y);
        if(d<54){
          UI.toast("✓ Level geschafft");
          stopSim();
          // auto-next
          if(LevelSystem.index()<LevelSystem.count()-1){
            LevelSystem.next();
            state=createInitialState(LevelSystem.current());
            UI.setMaterialActive(state.editor.currentMaterial);
          }
          break;
        }
        const voidY=state.level.voidZone.y+160;
        if(state.vehicle.wL.y>voidY && state.vehicle.wR.y>voidY){
          UI.toast("✗ Absturz");
          stopSim();
          break;
        }
      }
    }
  }

  requestAnimationFrame(step);
}

document.addEventListener("DOMContentLoaded", game);
</script>
</body>
</html>
