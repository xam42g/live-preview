<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
  <title>Stack Smash – Touch</title>
  <style>
    :root{
      --bg1:#6fd3ff;
      --bg2:#cfefff;
      --dark:#2a2f3a;
      --dark2:#1d222b;
      --violet:#8b67ff;
      --violet2:#6a49ff;
      --ball:#ff4fb6;
      --ui:#ffffffcc;
    }
    html,body{height:100%;margin:0;overflow:hidden;background:linear-gradient(180deg,var(--bg1),var(--bg2));font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;}
    canvas{display:block;touch-action:manipulation;}
    .hud{
      position:fixed; inset:12px 12px auto 12px;
      display:flex; align-items:center; justify-content:space-between;
      pointer-events:none;
    }
    .pill{
      pointer-events:none;
      background:rgba(255,255,255,.35);
      border:1px solid rgba(255,255,255,.35);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-radius:14px;
      padding:8px 12px;
      color:#132033;
      font-weight:700;
      letter-spacing:.2px;
      display:flex; gap:10px; align-items:baseline;
    }
    .pill small{font-weight:700;opacity:.75}
    .centerOverlay{
      position:fixed; inset:0;
      display:flex; align-items:center; justify-content:center;
      pointer-events:none;
    }
    .card{
      width:min(520px, calc(100% - 40px));
      background:rgba(10,18,30,.45);
      border:1px solid rgba(255,255,255,.15);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius:18px;
      padding:18px;
      color:white;
      text-align:center;
      transform: translateZ(0);
    }
    .card h1{margin:6px 0 2px;font-size:22px;}
    .card p{margin:6px 0 14px;opacity:.9;line-height:1.35}
    .btnRow{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;pointer-events:auto}
    button{
      border:0;
      border-radius:14px;
      padding:12px 16px;
      font-weight:800;
      cursor:pointer;
      background:white;
      color:#101827;
      box-shadow:0 10px 24px rgba(0,0,0,.25);
    }
    button.secondary{background:rgba(255,255,255,.18); color:white; border:1px solid rgba(255,255,255,.22); box-shadow:none;}
    .hint{font-size:13px; opacity:.85}
  </style>
</head>
<body>
  <canvas id="c"></canvas>

  <div class="hud">
    <div class="pill"><small>Level</small> <span id="lvl">1</span></div>
    <div class="pill"><small>Score</small> <span id="score">0</span></div>
    <div class="pill"><small>Best</small> <span id="best">0</span></div>
  </div>

  <div class="centerOverlay" id="overlay" style="display:none;">
    <div class="card">
      <h1 id="ovTitle">Game Over</h1>
      <p id="ovText">Tippe, wenn das lila Segment vorne ist. Triffst du grau/schwarz: Game Over.</p>
      <div class="btnRow">
        <button id="btnRetry">Nochmal</button>
        <button class="secondary" id="btnNext" style="display:none;">Nächstes Level</button>
      </div>
      <p class="hint" id="ovHint">Tipp: Kurze, schnelle Taps sind am sichersten.</p>
    </div>
  </div>

<script>
(() => {
  // -------- Helpers --------
  const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
  const TAU=Math.PI*2;

  // -------- Canvas setup (pixel-perfect, fast) --------
  const canvas=document.getElementById('c');
  const ctx=canvas.getContext('2d', { alpha:false, desynchronized:true });
  let W=0,H=0, DPR=1;
  function resize(){
    DPR=Math.max(1, Math.min(2.25, window.devicePixelRatio||1));
    W=window.innerWidth; H=window.innerHeight;
    canvas.width=Math.floor(W*DPR);
    canvas.height=Math.floor(H*DPR);
    canvas.style.width=W+'px';
    canvas.style.height=H+'px';
    ctx.setTransform(DPR,0,0,DPR,0,0);
  }
  window.addEventListener('resize', resize, {passive:true});
  resize();

  // -------- UI --------
  const elLvl=document.getElementById('lvl');
  const elScore=document.getElementById('score');
  const elBest=document.getElementById('best');
  const overlay=document.getElementById('overlay');
  const ovTitle=document.getElementById('ovTitle');
  const ovText=document.getElementById('ovText');
  const ovHint=document.getElementById('ovHint');
  const btnRetry=document.getElementById('btnRetry');
  const btnNext=document.getElementById('btnNext');

  const BEST_KEY='stack_smash_best_v1';
  let best=Number(localStorage.getItem(BEST_KEY)||'0')||0;
  elBest.textContent=best;

  // -------- Game data (multiple levels) --------
  // Each layer: ring with segments; one "safe" purple segment, others dark.
  // Touch: if safe segment is at front angle -> break it and drop.
  const LEVELS=[
    { layers: 16, segsMin: 4, segsMax: 7, safeCount: 1, rotSpeed: 0.010, dropSpeed: 18 },
    { layers: 20, segsMin: 5, segsMax: 8, safeCount: 1, rotSpeed: 0.013, dropSpeed: 20 },
    { layers: 24, segsMin: 5, segsMax: 9, safeCount: 1, rotSpeed: 0.016, dropSpeed: 22 },
    { layers: 28, segsMin: 6, segsMax: 10, safeCount: 1, rotSpeed: 0.019, dropSpeed: 24 },
    { layers: 32, segsMin: 6, segsMax: 11, safeCount: 1, rotSpeed: 0.022, dropSpeed: 26 },
  ];

  // -------- World / visuals --------
  const world={
    levelIndex:0,
    score:0,
    state:'playing', // playing | dropping | gameover | win
    t:0,
    camY:0,
    shake:0,
  };

  // stack geometry
  const stack={
    x:0, y:0,
    rOuter:120,
    rInner:56,
    layerH:22,
    layers:[],
    rotation:0,
  };

  const ball={
    x:0,
    y:0,
    r:16,
    // front angle is 0 (pointing "down" screen). We'll test segments at that.
  };

  function rand(a,b){ return a + Math.random()*(b-a); }
  function randi(a,b){ return Math.floor(rand(a,b+1)); }

  function makeLevel(i){
    const cfg=LEVELS[clamp(i,0,LEVELS.length-1)];
    stack.layers.length=0;
    stack.rotation=0;

    for(let li=0; li<cfg.layers; li++){
      const segCount=randi(cfg.segsMin, cfg.segsMax);
      // Build segments around ring.
      // Choose safe segments (purple) spaced out; remaining are dark.
      const segs=[];
      const gap=0.10; // small gap between segments (radians fraction)
      const base=TAU/segCount;

      // pick safe segment indices
      const safeSet=new Set();
      while(safeSet.size<cfg.safeCount){ safeSet.add(randi(0,segCount-1)); }

      for(let si=0; si<segCount; si++){
        const a0=si*base + base*gap*0.5;
        const a1=(si+1)*base - base*gap*0.5;
        segs.push({
          a0,a1,
          safe: safeSet.has(si),
          broken:false,
        });
      }
      stack.layers.push({ segs, cleared:false });
    }

    // Layout
    stack.x=W*0.5;
    stack.y=H*0.58;

    // adaptive sizes
    const minDim=Math.min(W,H);
    stack.rOuter=clamp(minDim*0.18, 90, 150);
    stack.rInner=stack.rOuter*0.46;
    stack.layerH=clamp(minDim*0.035, 18, 26);

    ball.x=stack.x;
    ball.y=stack.y - stack.layers.length*stack.layerH + 28;

    world.camY=0;
    world.shake=0;

    elLvl.textContent=String(i+1);
  }

  function showOverlay(kind){
    overlay.style.display='flex';
    btnNext.style.display='none';
    if(kind==='gameover'){
      ovTitle.textContent='GAME OVER';
      ovText.textContent='Du hast grau/schwarz erwischt. Tippe lila, dann fällt der Ball eine Etage.';
      ovHint.textContent='Tipp: Warte auf lila vorne und tippe genau dann.';
    } else if(kind==='win'){
      ovTitle.textContent='LEVEL GESCHAFFT!';
      ovText.textContent='Nice! Weiter zum nächsten Level?';
      ovHint.textContent='Die nächsten Level rotieren schneller.';
      btnNext.style.display='inline-block';
    } else if(kind==='start'){
      ovTitle.textContent='STACK SMASH';
      ovText.textContent='Tippe, wenn lila vorne ist. Triffst du grau/schwarz: Game Over.';
      ovHint.textContent='Ziel: bis ganz nach unten.';
      btnNext.style.display='none';
    }
  }
  function hideOverlay(){ overlay.style.display='none'; }

  function resetRun(toLevelIndex){
    world.levelIndex=toLevelIndex;
    world.score=0;
    elScore.textContent='0';
    makeLevel(world.levelIndex);
    world.state='playing';
    hideOverlay();
  }

  // -------- Hit logic --------
  // Front angle in world space is PI/2 (downwards) in canvas coordinates.
  // We'll define "front" as angle = PI/2.
  const FRONT=Math.PI/2;

  function findActiveLayerIndex(){
    // ball is above the top, then drops down layer by layer. Determine which layer it is targeting.
    // Define layer centers from top to bottom.
    const topY=stack.y - (stack.layers.length-1)*stack.layerH;
    // Find nearest layer under the ball.
    const dy=ball.y - topY;
    const idx=Math.round(dy/stack.layerH);
    return clamp(idx, 0, stack.layers.length-1);
  }

  function segmentAtAngle(layer, ang){
    // Normalize angle to [0,TAU)
    let a=(ang%TAU+TAU)%TAU;
    for(const s of layer.segs){
      if(s.broken) continue;
      // handle wrap not needed since we build increasing a0<a1 in [0,TAU]
      if(a>=s.a0 && a<=s.a1) return s;
    }
    return null;
  }

  function tap(){
    if(world.state==='gameover' || world.state==='win') return;
    if(world.state==='dropping') return; // avoid double taps during fall

    const li=findActiveLayerIndex();
    const layer=stack.layers[li];

    // test angle at front relative to stack rotation
    const testAng=(FRONT - stack.rotation);
    const seg=segmentAtAngle(layer, testAng);

    if(seg && seg.safe){
      seg.broken=true;
      // if all segments broken in that layer -> mark cleared
      let anyLeft=false;
      for(const s of layer.segs){ if(!s.broken){ anyLeft=true; break; } }
      layer.cleared=!anyLeft;

      // add score
      world.score += 1;
      elScore.textContent=String(world.score);
      if(world.score>best){ best=world.score; localStorage.setItem(BEST_KEY, String(best)); elBest.textContent=String(best); }

      // drop to next layer smoothly
      world.state='dropping';
      world.dropTargetY = ball.y + stack.layerH;
      world.shake=6;
    } else {
      world.state='gameover';
      world.shake=10;
      showOverlay('gameover');
    }
  }

  // -------- Input (touch + mouse) --------
  let lastTap=0;
  function onPointerDown(e){
    // small debounce to avoid iOS double events
    const now=performance.now();
    if(now-lastTap<80) return;
    lastTap=now;
    tap();
  }
  canvas.addEventListener('pointerdown', onPointerDown, {passive:true});

  btnRetry.addEventListener('click', () => {
    resetRun(world.levelIndex);
  });
  btnNext.addEventListener('click', () => {
    const next = (world.levelIndex+1) % LEVELS.length;
    resetRun(next);
  });

  // -------- Rendering (fast pseudo-3D) --------
  function drawRing(x,y,rOuter,rInner,a0,a1,fill){
    ctx.beginPath();
    ctx.arc(x,y,rOuter,a0,a1,false);
    ctx.arc(x,y,rInner,a1,a0,true);
    ctx.closePath();
    ctx.fillStyle=fill;
    ctx.fill();
  }

  function drawShadowEllipse(x,y,rx,ry,alpha){
    ctx.save();
    ctx.translate(x,y);
    ctx.scale(rx,ry);
    ctx.globalAlpha=alpha;
    ctx.beginPath();
    ctx.arc(0,0,1,0,TAU);
    ctx.fillStyle='#000';
    ctx.fill();
    ctx.restore();
    ctx.globalAlpha=1;
  }

  function render(){
    // background
    ctx.fillStyle='#000';
    ctx.fillRect(0,0,W,H);

    // gradient background (cheap)
    const g=ctx.createLinearGradient(0,0,0,H);
    g.addColorStop(0,getComputedStyle(document.documentElement).getPropertyValue('--bg1').trim());
    g.addColorStop(1,getComputedStyle(document.documentElement).getPropertyValue('--bg2').trim());
    ctx.fillStyle=g;
    ctx.fillRect(0,0,W,H);

    // camera shake
    const sh=world.shake;
    const sx=(Math.random()-0.5)*sh;
    const sy=(Math.random()-0.5)*sh;

    // center pole
    const poleW=stack.rInner*0.95;
    const poleX=stack.x + sx;
    const poleTop=stack.y - (stack.layers.length*stack.layerH) + sy - world.camY;
    const poleBottom=stack.y + stack.layerH*2 + sy - world.camY;

    // pole body
    ctx.fillStyle='rgba(255,255,255,0.85)';
    const poleH=poleBottom-poleTop;
    ctx.fillRect(poleX - poleW*0.35, poleTop, poleW*0.7, poleH);
    // subtle pole highlight
    ctx.fillStyle='rgba(255,255,255,0.55)';
    ctx.fillRect(poleX - poleW*0.35 + poleW*0.08, poleTop, poleW*0.10, poleH);

    // stack layers (back-to-front)
    const baseY=stack.y + sy - world.camY;
    const topY=baseY - (stack.layers.length-1)*stack.layerH;

    for(let i=0;i<stack.layers.length;i++){
      const y=topY + i*stack.layerH;
      const layer=stack.layers[i];

      // small fake depth: darker under
      drawShadowEllipse(stack.x+sx, y+stack.layerH*0.35, stack.rOuter*0.013, stack.rOuter*0.005, 0.10);

      // ring base plate
      // draw segments
      const rot=stack.rotation;
      for(const s of layer.segs){
        if(s.broken) continue;
        const a0=s.a0+rot;
        const a1=s.a1+rot;
        // color
        const col = s.safe ? 'rgba(139,103,255,0.95)' : 'rgba(35,40,52,0.95)';
        drawRing(stack.x+sx, y, stack.rOuter, stack.rInner, a0, a1, col);
      }

      // ring side shading (very cheap: a band)
      ctx.globalAlpha=0.18;
      ctx.fillStyle='#000';
      ctx.fillRect(stack.x+sx - stack.rOuter, y, stack.rOuter*2, stack.layerH*0.42);
      ctx.globalAlpha=1;

      // top highlight
      ctx.globalAlpha=0.10;
      ctx.strokeStyle='#fff';
      ctx.lineWidth=2;
      ctx.beginPath();
      ctx.arc(stack.x+sx, y, stack.rOuter-1, 0, TAU);
      ctx.stroke();
      ctx.globalAlpha=1;
    }

    // ball shadow
    drawShadowEllipse(ball.x+sx, ball.y + 26 + sy - world.camY, 0.020*stack.rOuter, 0.008*stack.rOuter, 0.20);

    // ball
    const by=ball.y + sy - world.camY;
    ctx.beginPath();
    ctx.arc(ball.x+sx, by, ball.r, 0, TAU);
    ctx.fillStyle='rgba(255,79,182,0.95)';
    ctx.fill();
    // ball highlight
    ctx.globalAlpha=0.22;
    ctx.beginPath();
    ctx.arc(ball.x+sx - ball.r*0.35, by - ball.r*0.35, ball.r*0.55, 0, TAU);
    ctx.fillStyle='#fff';
    ctx.fill();
    ctx.globalAlpha=1;

    // level bottom marker
    ctx.globalAlpha=0.12;
    ctx.fillStyle='#0b1220';
    ctx.fillRect(0, baseY + stack.layerH*1.2, W, H);
    ctx.globalAlpha=1;
  }

  // -------- Update loop --------
  let last=performance.now();

  function update(dt){
    world.t += dt;

    const cfg=LEVELS[clamp(world.levelIndex,0,LEVELS.length-1)];

    // smooth rotation (slightly eased)
    stack.rotation += cfg.rotSpeed * dt * 60;

    // camera follows ball so it stays near upper-middle (smooth)
    const desiredCam = clamp((ball.y - (stack.y - stack.layers.length*stack.layerH + 90)), -9999, 9999);
    world.camY += (desiredCam - world.camY) * (1 - Math.pow(0.001, dt));

    // shake decay
    world.shake *= Math.pow(0.02, dt);

    if(world.state==='dropping'){
      // smooth drop
      const speed = cfg.dropSpeed * (dt*60);
      ball.y += speed;
      if(ball.y >= world.dropTargetY - 0.5){
        ball.y = world.dropTargetY;
        world.state='playing';

        // win check: reached bottom
        const bottomY = stack.y + stack.layerH*0.5;
        if(ball.y >= bottomY){
          world.state='win';
          showOverlay('win');
        }
      }
    }
  }

  function frame(now){
    const dt = clamp((now-last)/1000, 0, 0.033);
    last=now;
    if(world.state!=='gameover' && world.state!=='win') update(dt);
    render();
    requestAnimationFrame(frame);
  }

  // Start
  makeLevel(0);
  showOverlay('start');
  overlay.style.display='flex';
  // start when user taps anywhere (including overlay)
  overlay.addEventListener('pointerdown', (e)=>{
    // if game is at start screen
    if(ovTitle.textContent==='STACK SMASH'){
      hideOverlay();
      world.state='playing';
      e.preventDefault();
    }
  }, {passive:false});

  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
