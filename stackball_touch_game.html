<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
  <title>Stack Touch</title>
  <style>
    :root{ --bg1:#74c8ff; --bg2:#e9f7ff; --ui:#0b0f18; --panel:rgba(16,22,35,.55); --purple:#8f7bff; --purple2:#b7a6ff; --dark:#3b4152; --dark2:#565d73; --ball:#ff4fb8; --ball2:#ff7ad0; }
    html,body{height:100%; margin:0; background:linear-gradient(180deg,var(--bg1),var(--bg2)); font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif; overflow:hidden;}
    canvas{display:block; width:100vw; height:100vh; touch-action:none;}
    .hud{position:fixed; inset:0; pointer-events:none;}
    .topbar{position:absolute; left:0; right:0; top:0; padding:10px 14px; display:flex; align-items:center; justify-content:center; gap:14px; color:white; font-weight:700; text-shadow:0 2px 10px rgba(0,0,0,.25);}
    .level{font-size:18px; opacity:.95;}
    .progress{width:min(320px,60vw); height:10px; border-radius:8px; background:rgba(0,0,0,.25); overflow:hidden;}
    .progress > div{height:100%; width:0%; background:rgba(255,255,255,.85);}
    .leftbar{position:absolute; left:14px; top:120px; width:22px; height:180px; border-radius:14px; background:rgba(0,0,0,.18); overflow:hidden;}
    .leftbar > div{position:absolute; left:0; right:0; bottom:0; height:0%; background:rgba(255,170,60,.9);} 
    .centerOverlay{position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); padding:18px 20px; border-radius:14px; background:var(--panel); color:white; text-align:center; min-width:min(320px,78vw); display:none;}
    .centerOverlay h1{margin:0 0 6px 0; font-size:28px; letter-spacing:.5px;}
    .centerOverlay .score{font-size:54px; font-weight:900; margin:8px 0 6px 0;}
    .centerOverlay .best{opacity:.9; font-weight:700;}
    .buttons{margin-top:14px; display:flex; gap:12px; justify-content:center; pointer-events:auto;}
    button{border:0; border-radius:14px; padding:12px 14px; font-weight:800; font-size:16px; cursor:pointer; background:rgba(255,255,255,.9); color:#0b0f18; box-shadow:0 12px 30px rgba(0,0,0,.18);} 
    button:active{transform:translateY(1px);} 
    .hint{position:absolute; right:14px; top:74px; padding:10px 12px; border-radius:12px; background:rgba(0,0,0,.25); color:white; font-weight:700; display:flex; gap:10px; align-items:center;}
    .hint .icon{width:34px; height:34px; border-radius:10px; background:rgba(255,255,255,.2); display:grid; place-items:center; font-size:18px;}
    .hint small{display:block; opacity:.9; font-weight:600;}
    .footer{position:absolute; left:0; right:0; bottom:12px; text-align:center; color:rgba(255,255,255,.75); font-weight:700; text-shadow:0 2px 10px rgba(0,0,0,.15);} 
    .footer span{background:rgba(0,0,0,.18); padding:6px 10px; border-radius:999px;}
  </style>
</head>
<body>
  <canvas id="c"></canvas>

  <div class="hud">
    <div class="topbar">
      <div class="level" id="level">4–5</div>
      <div class="progress"><div id="prog"></div></div>
      <div class="level" id="remaining">30</div>
    </div>
    <div class="leftbar" aria-hidden="true"><div id="fv"></div></div>

    <div class="hint" id="hint">
      <div class="icon">↻</div>
      <div>
        Rotate<br><small>your screen</small>
      </div>
    </div>

    <div class="centerOverlay" id="overlay">
      <h1>GAME OVER</h1>
      <div class="best" id="bestLine">👑 0</div>
      <div class="score" id="scoreLine">0</div>
      <div class="buttons">
        <button id="restartBtn">⟲ Neu starten</button>
        <button id="homeBtn">⌂ Start</button>
      </div>
    </div>

    <div class="footer"><span>Tippe, um lila Platten zu zerstören. Triffst du grau: Game Over.</span></div>
  </div>

<script>
(() => {
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');

  const ui = {
    level: document.getElementById('level'),
    remaining: document.getElementById('remaining'),
    prog: document.getElementById('prog'),
    fv: document.getElementById('fv'),
    overlay: document.getElementById('overlay'),
    bestLine: document.getElementById('bestLine'),
    scoreLine: document.getElementById('scoreLine'),
    restartBtn: document.getElementById('restartBtn'),
    homeBtn: document.getElementById('homeBtn'),
    hint: document.getElementById('hint'),
  };

  const DPR = () => Math.max(1, Math.min(3, window.devicePixelRatio || 1));
  function resize(){
    const dpr = DPR();
    canvas.width = Math.floor(innerWidth * dpr);
    canvas.height = Math.floor(innerHeight * dpr);
    canvas.style.width = innerWidth + 'px';
    canvas.style.height = innerHeight + 'px';
    ctx.setTransform(dpr,0,0,dpr,0,0);
  }
  addEventListener('resize', resize);
  resize();

  const rand = (a,b)=>a+Math.random()*(b-a);
  const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
  const easeOut = t => 1 - Math.pow(1-t,3);

  const state = {
    running: true,
    score: 0,
    best: Number(localStorage.getItem('stack_touch_best')||0),
    level: 4,
    targetLevel: 5,
    ringsTotal: 30,
    ringsLeft: 30,
    smash: 0, // energy bar
    smashMax: 100,
    time: 0,
  };

  // Tower model: stack of rings; each ring has type: 'purple' or 'dark' or 'gap'
  const tower = {
    x: 0,
    y: 0,
    radius: 84,
    thickness: 18,
    shaftRadius: 34,
    rings: [],
    ringY: [],
  };

  const ball = {
    x: 0,
    y: 0,
    r: 16,
    vy: 0,
    g: 2600,
    bounce: 0.35,
    dropSpeed: 520,
    colorPulse: 0,
  };

  const fx = [];

  function newTower(){
    state.ringsTotal = 30;
    state.ringsLeft = state.ringsTotal;
    tower.rings.length = 0;
    tower.ringY.length = 0;
    const safeFirst = 2;
    for(let i=0;i<state.ringsTotal;i++){
      let t;
      if(i < safeFirst) t = 'purple';
      else {
        // purple is more common
        t = Math.random() < 0.72 ? 'purple' : 'dark';
      }
      tower.rings.push({ type:t, broken:false });
    }
  }

  function resetGame(){
    state.running = true;
    state.score = 0;
    state.smash = 0;
    state.level = 4;
    state.targetLevel = 5;
    ui.level.textContent = `${state.level}`;
    ui.overlay.style.display = 'none';
    ui.hint.style.display = 'flex';

    newTower();
    ball.vy = 0;
    ball.y = 160;
    ball.x = 0;
  }

  function goHome(){
    // "Start" here just resets and hides overlay.
    resetGame();
  }

  resetGame();

  function layout(){
    const w = innerWidth;
    const h = innerHeight;
    tower.x = w/2;
    tower.y = h*0.62;

    // recompute ring positions (top to bottom)
    tower.ringY.length = state.ringsTotal;
    const topY = tower.y - state.ringsTotal * tower.thickness;
    for(let i=0;i<state.ringsTotal;i++){
      tower.ringY[i] = topY + i*tower.thickness;
    }

    // keep ball above the top
    ball.x = tower.x;
    // ball.y is world y, keep it within view
    ball.y = clamp(ball.y, 80, h-120);
  }

  layout();
  addEventListener('resize', layout);

  function ringIndexUnderBall(){
    // ball is around some y; find nearest ring y band
    for(let i=0;i<state.ringsTotal;i++){
      const y = tower.ringY[i];
      if(ball.y + ball.r >= y && ball.y - ball.r <= y + tower.thickness){
        return i;
      }
    }
    return -1;
  }

  function spawnShards(y, type){
    const n = 10;
    for(let i=0;i<n;i++){
      fx.push({
        x: tower.x + rand(-tower.radius*0.8, tower.radius*0.8),
        y: y + rand(2, tower.thickness-2),
        vx: rand(-520,520),
        vy: rand(-820,-120),
        life: rand(0.4,0.8),
        t: 0,
        type,
        s: rand(5,10)
      });
    }
  }

  function gameOver(){
    state.running = false;
    state.best = Math.max(state.best, state.score);
    localStorage.setItem('stack_touch_best', String(state.best));
    ui.bestLine.textContent = `👑 ${state.best}`;
    ui.scoreLine.textContent = `${state.score}`;
    ui.overlay.style.display = 'block';
    ui.hint.style.display = 'none';
  }

  function onTap(){
    if(!state.running) return;

    // hide hint after first action
    ui.hint.style.display = 'none';

    const idx = ringIndexUnderBall();
    if(idx < 0) return;

    const ring = tower.rings[idx];
    if(ring.broken) return;

    if(ring.type === 'purple'){
      ring.broken = true;
      state.score += 1;
      state.ringsLeft -= 1;
      state.smash = clamp(state.smash + 18, 0, state.smashMax);
      spawnShards(tower.ringY[idx], 'purple');

      // small drop effect
      ball.vy = Math.max(ball.vy, ball.dropSpeed);

      // if finished
      if(state.ringsLeft <= 0){
        // next run: slightly harder (more dark rings)
        state.level += 1;
        state.targetLevel = state.level + 1;
        newTower();
        // put tower back under ball
        ball.y = 160;
        layout();
      }
    } else {
      // hit dark => game over
      spawnShards(tower.ringY[idx], 'dark');
      gameOver();
    }
  }

  canvas.addEventListener('pointerdown', (e)=>{
    e.preventDefault();
    onTap();
  }, {passive:false});

  ui.restartBtn.addEventListener('click', ()=> resetGame());
  ui.homeBtn.addEventListener('click', ()=> goHome());

  function drawCylinder(){
    // shaft
    const w = innerWidth;
    const h = innerHeight;

    const shaftTop = 60;
    const shaftBottom = tower.y + tower.thickness*2;

    const grad = ctx.createLinearGradient(tower.x, shaftTop, tower.x, shaftBottom);
    grad.addColorStop(0, 'rgba(255,255,255,0.95)');
    grad.addColorStop(1, 'rgba(230,235,245,0.95)');
    ctx.fillStyle = grad;

    const r = tower.shaftRadius;
    // rounded rect
    ctx.beginPath();
    ctx.moveTo(tower.x - r, shaftTop + r);
    ctx.arcTo(tower.x - r, shaftTop, tower.x, shaftTop, r);
    ctx.arcTo(tower.x + r, shaftTop, tower.x + r, shaftTop + r, r);
    ctx.lineTo(tower.x + r, shaftBottom - r);
    ctx.arcTo(tower.x + r, shaftBottom, tower.x, shaftBottom, r);
    ctx.arcTo(tower.x - r, shaftBottom, tower.x - r, shaftBottom - r, r);
    ctx.closePath();
    ctx.fill();

    // subtle shadow
    ctx.fillStyle = 'rgba(0,0,0,0.10)';
    ctx.beginPath();
    ctx.ellipse(tower.x+8, shaftBottom, r*0.95, 12, 0, 0, Math.PI*2);
    ctx.fill();
  }

  function ringColor(type, layer){
    if(type==='purple') return layer ? 'rgba(183,166,255,0.95)' : 'rgba(143,123,255,0.98)';
    return layer ? 'rgba(86,93,115,0.95)' : 'rgba(59,65,82,0.98)';
  }

  function drawRing(i){
    const ring = tower.rings[i];
    if(ring.broken) return;

    const y = tower.ringY[i];
    const r = tower.radius;
    const t = tower.thickness;

    // top face
    ctx.fillStyle = ringColor(ring.type, true);
    ctx.beginPath();
    ctx.ellipse(tower.x, y, r, 16, 0, 0, Math.PI*2);
    ctx.fill();

    // body
    ctx.fillStyle = ringColor(ring.type, false);
    ctx.beginPath();
    ctx.roundRect(tower.x - r, y, r*2, t, 10);
    ctx.fill();

    // inner hole
    ctx.fillStyle = 'rgba(0,0,0,0.10)';
    ctx.beginPath();
    ctx.ellipse(tower.x, y+2, tower.shaftRadius*1.05, 10, 0, 0, Math.PI*2);
    ctx.fill();

    // small specks like in screenshot
    if(ring.type==='purple'){
      ctx.fillStyle = 'rgba(255,170,230,0.5)';
      for(let k=0;k<3;k++){
        ctx.beginPath();
        ctx.arc(tower.x + rand(-r*0.7,r*0.7), y + rand(2,t-2), rand(1.3,2.2), 0, Math.PI*2);
        ctx.fill();
      }
    }
  }

  function drawTower(){
    // draw from back to front (top to bottom)
    for(let i=0;i<state.ringsTotal;i++) drawRing(i);
  }

  function drawBall(){
    const pulse = (Math.sin(state.time*8)+1)/2;
    const grad = ctx.createRadialGradient(ball.x-4, ball.y-6, 4, ball.x, ball.y, ball.r+10);
    grad.addColorStop(0, 'rgba(255,180,220,0.95)');
    grad.addColorStop(1, 'rgba(255,79,184,0.98)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI*2);
    ctx.fill();

    // shadow
    ctx.fillStyle = 'rgba(0,0,0,0.12)';
    ctx.beginPath();
    ctx.ellipse(ball.x+10, ball.y+18, ball.r*0.9, 6, 0, 0, Math.PI*2);
    ctx.fill();
  }

  function drawFX(dt){
    for(let i=fx.length-1;i>=0;i--){
      const p = fx[i];
      p.t += dt;
      if(p.t >= p.life){ fx.splice(i,1); continue; }
      const a = p.t / p.life;
      p.vy += 2600*dt;
      p.x += p.vx*dt;
      p.y += p.vy*dt;
      const alpha = 1 - easeOut(a);
      ctx.globalAlpha = alpha;
      ctx.fillStyle = p.type==='purple' ? 'rgba(183,166,255,0.95)' : 'rgba(86,93,115,0.95)';
      ctx.fillRect(p.x, p.y, p.s, p.s);
      ctx.globalAlpha = 1;
    }
  }

  function updateUI(){
    ui.level.textContent = `${state.level}`;
    ui.remaining.textContent = `${state.ringsLeft}`;
    const pct = 100 * (1 - state.ringsLeft / state.ringsTotal);
    ui.prog.style.width = `${clamp(pct,0,100)}%`;
    ui.fv.style.height = `${clamp(100*state.smash/state.smashMax,0,100)}%`;
  }

  let last = performance.now();
  function tick(now){
    const dt = Math.min(0.033, (now-last)/1000);
    last = now;
    state.time += dt;

    if(state.running){
      // gravity
      ball.vy += ball.g*dt;
      ball.y += ball.vy*dt;

      // collide with current ring (acts like a floor unless broken)
      const idx = ringIndexUnderBall();
      if(idx >= 0){
        const ring = tower.rings[idx];
        const y = tower.ringY[idx];
        if(!ring.broken){
          const floorY = y; // top of ring
          if(ball.y + ball.r > floorY && ball.vy > 0){
            ball.y = floorY - ball.r;
            ball.vy = -ball.vy * ball.bounce;
            // decay smash bar
            state.smash = clamp(state.smash - 10*dt, 0, state.smashMax);
          }
        } else {
          // if ring is broken, let ball fall faster
          ball.vy = Math.max(ball.vy, ball.dropSpeed);
          state.smash = clamp(state.smash - 18*dt, 0, state.smashMax);
        }
      }

      // keep in view
      if(ball.y > innerHeight - 60){
        ball.y = innerHeight - 60;
        ball.vy = -Math.abs(ball.vy) * 0.2;
      }
    }

    // draw
    ctx.clearRect(0,0,innerWidth,innerHeight);
    drawCylinder();
    drawTower();
    drawBall();
    drawFX(dt);

    updateUI();
    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
})();
</script>
</body>
</html>
