<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>EndlessDashSchrippelFinal_v2</title>
<style>
:root {
  --bg:#08131d;
  --panel:rgba(10,16,28,.94);
  --panel2:rgba(18,28,44,.88);
  --line:rgba(255,255,255,.12);
  --text:#f4f7ff;
  --muted:rgba(244,247,255,.72);
  --btn:#1d3150;
  --btn2:#243b60;
  --green:#0f6c43;
  --gold:#f3c85b;
  --enemy:#ff5a5a;
  --shadow:0 14px 36px rgba(0,0,0,.42);
}
*{box-sizing:border-box}
html,body{
  margin:0; padding:0; width:100%; height:100%; overflow:hidden;
  background:linear-gradient(180deg,#08121b,#081520 58%,#07131a);
  color:var(--text);
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
}
#wrap{position:fixed; inset:0;}
#gameCanvas{
  width:100vw; height:100dvh; height:100svh; display:block;
  touch-action:none; background:#0a1220;
}
#topLeft{
  position:fixed;
  left:max(10px, env(safe-area-inset-left));
  top:max(10px, env(safe-area-inset-top));
  z-index:30;
  display:flex; gap:8px; align-items:flex-start;
}
.stat{
  padding:8px 10px;
  border-radius:14px;
  background:rgba(20,30,46,.88);
  border:1px solid var(--line);
  box-shadow:var(--shadow);
}
.stat b{display:block; font-size:12px}
.stat small{display:block; font-size:11px; opacity:.78; margin-top:2px}
#bottomRight{
  position:fixed;
  right:max(10px, env(safe-area-inset-right));
  bottom:max(10px, env(safe-area-inset-bottom));
  z-index:35;
  display:flex; gap:10px;
}
#bottomRight .btn{min-width:120px; text-align:center}
#abilityHud{
  position:fixed;
  left:max(10px, env(safe-area-inset-left));
  bottom:max(10px, env(safe-area-inset-bottom));
  z-index:34;
  display:flex; gap:8px; flex-wrap:wrap; max-width:58vw;
}
.abilityBadge{
  min-width:96px;
  padding:9px 10px;
  border-radius:14px;
  background:rgba(20,28,40,.94);
  border:1px solid rgba(255,255,255,.12);
  box-shadow:var(--shadow);
  font-size:12px;
}
.abilityBadge b{display:block; font-size:12px}
.abilityBadge small{display:block; color:#fff; opacity:.95; margin-top:2px}
.btn{
  appearance:none; border:none; cursor:pointer;
  background:var(--btn); color:#fff;
  padding:11px 14px; border-radius:14px;
  border:1px solid var(--line); font-weight:700;
  box-shadow:var(--shadow);
}
.btn.primary{background:linear-gradient(180deg,#5c6ff4,#4557d8)}
.btn.green{background:linear-gradient(180deg,#1f8a55,#166640)}
.btn:disabled{opacity:.45; cursor:not-allowed}
.overlay{
  position:fixed; inset:0; z-index:50; display:none;
  align-items:center; justify-content:center;
  background:rgba(0,0,0,.58);
  padding:16px;
}
.overlay.show{display:flex}
.card{
  width:min(640px, 94vw);
  max-height:min(88dvh, 88svh);
  overflow:auto;
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:20px;
  box-shadow:0 24px 70px rgba(0,0,0,.55);
  padding:18px;
}
.card h2{margin:0 0 8px 0; font-size:22px}
.muted{color:var(--muted); font-size:13px}
.row{display:flex; gap:10px; flex-wrap:wrap; align-items:center}
.row + .row{margin-top:10px}
.field{
  width:100%; padding:12px 14px; border-radius:12px;
  border:1px solid var(--line); background:rgba(255,255,255,.06);
  color:#fff; outline:none; font-size:16px;
}
#startOverlay .card{width:min(420px, 92vw); text-align:center}
#shopTabs{display:flex; gap:10px; margin-top:8px}
#skinGrid{
  display:grid; grid-template-columns:repeat(auto-fill,minmax(90px,1fr));
  gap:10px; margin-top:14px;
}
#abilityGrid{display:none; margin-top:14px}
.shopItem{
  border:1px solid var(--line);
  border-radius:14px;
  background:rgba(255,255,255,.04);
  padding:10px;
  text-align:center;
}
.skinPreview{
  width:60px; height:60px; margin:0 auto 8px; border-radius:50%;
  overflow:hidden; border:1px solid rgba(255,255,255,.14);
  background:#102033; display:flex; align-items:center; justify-content:center;
}
.spriteThumb{width:60px; height:60px; image-rendering:pixelated; background-repeat:no-repeat; border-radius:50%}
.small{font-size:12px; opacity:.9}
table{width:100%; border-collapse:collapse; margin-top:10px}
th,td{padding:10px 8px; border-bottom:1px solid rgba(255,255,255,.08); text-align:left; font-size:14px}
th:last-child, td:last-child{text-align:right}
.pill{display:inline-block; padding:4px 8px; border-radius:999px; background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.1); font-size:12px}
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>

<div id="topLeft">
  <div class="stat"><b id="scoreLabel">Score: 0</b><small id="coinLabel">Coins: 0</small></div>
  <div class="stat"><b id="bestLabel">Best: 0</b><small id="nameLabel">Player</small></div>
</div>

<div id="abilityHud"></div>

<div id="bottomRight">
  <button class="btn" id="shopBtn">Shop (B)</button>
  <button class="btn" id="restartBtn">Restart (R)</button>
  <button class="btn" id="lbBtn">Leaderboard (L)</button>
</div>

<div class="overlay show" id="startOverlay">
  <div class="card">
    <h2>Endless Dash</h2>
    <div class="muted">Name einmal eingeben, danach bleibt er gespeichert.</div>
    <div class="row" style="margin-top:14px">
      <input class="field" id="nameInput" placeholder="Name" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" />
    </div>
    <div class="row" style="justify-content:center; margin-top:14px">
      <button class="btn primary" id="startBtn">Start</button>
    </div>
  </div>
</div>

<div class="overlay" id="shopOverlay">
  <div class="card">
    <div class="row" style="justify-content:space-between">
      <h2>Shop</h2>
      <button class="btn" id="closeShopBtn">Schließen</button>
    </div>
    <div id="shopTabs">
      <button class="btn primary" id="shopTabSkins">Skins</button>
      <button class="btn" id="shopTabAbilities">Fähigkeiten</button>
    </div>
    <div id="skinGrid"></div>
    <div id="abilityGrid"></div>
  </div>
</div>

<div class="overlay" id="lbOverlay">
  <div class="card">
    <div class="row" style="justify-content:space-between">
      <h2>Leaderboard</h2>
      <div class="row">
        <button class="btn" id="setupBtn">Online Setup</button>
        <button class="btn" id="closeLbBtn">Schließen</button>
      </div>
    </div>
    <div id="lbStatus" class="row"></div>
    <div id="lbTableWrap"></div>
  </div>
</div>

<div class="overlay" id="setupOverlay">
  <div class="card">
    <div class="row" style="justify-content:space-between">
      <h2>Online Setup</h2>
      <button class="btn" id="closeSetupBtn">Schließen</button>
    </div>
    <div class="row" style="margin-top:12px"><input class="field" id="sbUrl" placeholder="https://xxxx.supabase.co" /></div>
    <div class="row"><input class="field" id="sbKey" placeholder="Publishable / anon key" /></div>
    <div class="row" style="margin-top:12px">
      <button class="btn primary" id="saveSetupBtn">Speichern</button>
      <button class="btn green" id="copyShareBtn">Share-Link kopieren</button>
    </div>
    <div class="muted" id="setupHint" style="margin-top:10px"></div>
  </div>
</div>

  function xhrJson(method, url, key, body, extraHeaders, cb) {
    try {
      const x = new XMLHttpRequest();
      x.open(method, url, true);
      x.setRequestHeader("apikey", key);
      x.setRequestHeader("Authorization", "Bearer " + key);
      x.setRequestHeader("Accept", "application/json");
      if(body !== null) x.setRequestHeader("Content-Type", "application/json");
      if(extraHeaders) for(const k in extraHeaders) x.setRequestHeader(k, extraHeaders[k]);
      x.onreadystatechange = function() {
        if(x.readyState !== 4) return;
        if(x.status >= 200 && x.status < 300) {
          let data = null;
          try { data = x.responseText ? JSON.parse(x.responseText) : null; } catch(_) { data = null; }
          cb(null, data);
        } else {
          cb(new Error("HTTP " + x.status + ": " + (x.responseText || "")));
        }
      };
      x.send(body !== null ? JSON.stringify(body) : null);
    } catch(err) {
      cb(err);
    }
  }

        if(!(x+w < kz.x+20 || x > kz.x+kz.w+20 || y+h < kz.y+20 || y > kz.y+kz.h+20)) {
          nearCorner = true; break;
        }
      }
      if(nearCorner) continue;
      let overlap = false;
      for(const b of blocks) {
        if(!(x+w < b.x-14 || x > b.x+b.w+14 || y+h < b.y-14 || y > b.y+b.h+14)) {
          overlap = true; break;
        }
      }
      if(!overlap) blocks.push({x,y,w,h});
    }
  }
  function moveCircleWithBlocks(nx, ny, r) {
    for(const b of blocks) {
      if(rectCircleOverlap(b.x,b.y,b.w,b.h,nx,ny,r)) {
        const left = Math.abs((b.x - r) - nx);
        const right = Math.abs((b.x + b.w + r) - nx);
        const top = Math.abs((b.y - r) - ny);
        const bottom = Math.abs((b.y + b.h + r) - ny);
        const m = Math.min(left,right,top,bottom);
        if(m===left) nx = b.x - r;
        else if(m===right) nx = b.x + b.w + r;
        else if(m===top) ny = b.y - r;
        else ny = b.y + b.h + r;
      }
    }
    return {x:nx,y:ny};
  }

  function rand(min,max) { return min + Math.random()*(max-min); }
  function clamp(v,a,b) { return Math.max(a, Math.min(b, v)); }
  function dist2(ax,ay,bx,by) { const dx=ax-bx, dy=ay-by; return dx*dx + dy*dy; }
  function overlayOpen() {
    return overlays.start.classList.contains("show") ||
           overlays.shop.classList.contains("show") ||
           overlays.lb.classList.contains("show") ||
           overlays.setup.classList.contains("show");
  }
  function setPaused(v) { state.paused = !!v; }

  function spawnCoin() {
    let tries = 0;
    while(tries++ < 80) {
      const c = { x:rand(40, WORLD_W-40), y:rand(40, WORLD_H-40), r:11, value:1 };
      if(dist2(c.x,c.y,player.x,player.y) > 110*110) {
        let insideBlock = false;
        for(const b of blocks) if(rectCircleOverlap(b.x,b.y,b.w,b.h,c.x,c.y,c.r)) { insideBlock = true; break; }
        if(!insideBlock) {
          state.coinEntities.push(c);
          return;
        }
      }
    }
  }
  function spawnEnemyFromSide() {
    const side = Math.floor(Math.random()*4);
    let x=0, y=0, ang=0;
    if(side===0) { x=18; y=rand(40,WORLD_H-40); ang=rand(-0.5,0.5); }
    if(side===1) { x=WORLD_W-18; y=rand(40,WORLD_H-40); ang=Math.PI+rand(-0.5,0.5); }
    if(side===2) { x=rand(40,WORLD_W-40); y=18; ang=Math.PI/2+rand(-0.5,0.5); }
    if(side===3) { x=rand(40,WORLD_W-40); y=WORLD_H-18; ang=-Math.PI/2+rand(-0.5,0.5); }
    const speed = 120 + Math.min(110, state.score*0.55);
    state.enemyEntities.push({x,y,r:10,vx:Math.cos(ang)*speed,vy:Math.sin(ang)*speed,speed});
  }

  function resetRun() {
    state.score = 0;
    state.coinsCollected = 0;
    state.coinEntities = [];
    state.enemyEntities = [];
    state.enemySpawnTimer = 0;
    player.x = WORLD_W/2; player.y = WORLD_H/2;
    sprintTimer = 0; shieldTimer = 0; dashTimer = 0;
    sprintCd = 0; shieldCd = 0; teleportCd = 0; dashCd = 0;
    extraLifeUsed = false;
    generateBlocks();
    for(let i=0;i<state.coinTarget;i++) spawnCoin();
  }

  function currentSkin() {
    const key = save.equippedSkin || "s0";
    const idx = key.charAt(0)==="s" ? parseInt(key.slice(1),10) : 0;
    const i = isFinite(idx) ? Math.max(0, Math.min(skins.length-1, idx)) : 0;
    return skins[i];
  }

  function abilityStatus(ab) {
    if(!save.ownedAbilities[ab.key]) return "nicht gekauft";
    if(ab.key==="life") return extraLifeUsed ? "verbraucht" : "bereit";
    const map = {dash:dashCd, sprint:sprintCd, shield:shieldCd, teleport:teleportCd};
    const cd = map[ab.key] || 0;
    if(cd > 0) return "CD " + cd.toFixed(1) + "s";
    if((ab.key==="dash" && dashTimer>0) || (ab.key==="sprint" && sprintTimer>0) || (ab.key==="shield" && shieldTimer>0)) return "aktiv";
    return "bereit";
  }
  function renderAbilityHud() {
    const hud = document.getElementById("abilityHud");
    hud.innerHTML = "";
    abilities.forEach(ab => {
      const d = document.createElement("div");
      d.className = "abilityBadge";
      d.innerHTML = `<b>${ab.label}</b><small>${ab.hotkey} · ${abilityStatus(ab)}</small>`;
      hud.appendChild(d);
    });
  }

  function updateHud() {
    document.getElementById("scoreLabel").textContent = "Score: " + Math.floor(state.score);
    document.getElementById("coinLabel").textContent = "Coins: " + save.coins;
    document.getElementById("bestLabel").textContent = "Best: " + save.best;
    document.getElementById("nameLabel").textContent = save.name || "Player";
    renderAbilityHud();
  }

  function gameOver() {
    if(!state.running) return;
    state.running = false;
    const finalScore = Math.floor(state.score);
    if(finalScore > save.best) save.best = finalScore;
    save.coins += state.coinsCollected;
    persistSave();
    updateHud();
    try { lbUpsertBest(loadLbCfg(), save.name || "Player", save.best); } catch(_) {}
    alert("Game Over\nScore: " + finalScore);
    overlays.start.classList.add("show");
    setPaused(true);
  }

  function startGame() {
    if(state.running) return;
    const nameInput = document.getElementById("nameInput");
    const v = nameInput.value.trim();
    if(v) save.name = v.slice(0,18);
    persistSave();
    nameInput.blur();
    overlays.start.classList.remove("show");
    state.running = true;
    setPaused(false);
    resetRun();
    updateHud();
  }

  const nameInput = document.getElementById("nameInput");
  nameInput.value = save.name || "";

  function openOverlay(el) { el.classList.add("show"); setPaused(true); }
  function closeOverlay(el) { el.classList.remove("show"); setPaused(overlayOpen()); }

  document.getElementById("startBtn").addEventListener("click", startGame);
  overlays.start.querySelector(".card").addEventListener("pointerup", function(e) {
    const t = e.target;
    if(t && (t.tagName==="INPUT" || t.tagName==="TEXTAREA" || t.tagName==="BUTTON")) return;
    startGame();
  });

  // keyboard
  const keys = Object.create(null);
  window.addEventListener("keydown", function(e) {
    const ae = document.activeElement;
    const typing = ae && (ae.tagName==="INPUT" || ae.tagName==="TEXTAREA" || ae.isContentEditable);
    const k = String(e.key || "").toLowerCase();

    if(!typing) {
      if(k==="r") { e.preventDefault(); resetRun(); state.running = true; setPaused(false); updateHud(); return; }
      if(k==="b") { e.preventDefault(); openShop(); return; }
      if(k==="l") { e.preventDefault(); openLb(); return; }
    }
    if(typing) return;
    keys[k] = true;
  }, true);
  window.addEventListener("keyup", function(e) {
    keys[String(e.key || "").toLowerCase()] = false;
  }, true);

  // shop
  function openShopTab(tab) {
    document.getElementById("shopTabSkins").classList.toggle("primary", tab==="skins");
    document.getElementById("shopTabAbilities").classList.toggle("primary", tab==="abilities");
    document.getElementById("skinGrid").style.display = tab==="skins" ? "grid" : "none";
    document.getElementById("abilityGrid").style.display = tab==="abilities" ? "block" : "none";
  }
  function renderAbilitiesShop() {
    const wrap = document.getElementById("abilityGrid");
    wrap.innerHTML = "";
    abilities.forEach(ab => {
      const row = document.createElement("div");
      row.className = "shopItem";
      row.style.textAlign = "left";
      row.innerHTML = `<div style="font-weight:700">${ab.label}</div><div class="small">${ab.hotkey}</div>`;
      const btn = document.createElement("button");
      btn.className = "btn";
      btn.style.marginTop = "8px";
      const owned = !!save.ownedAbilities[ab.key];
      btn.textContent = owned ? "Gekauft" : (save.coins >= ab.price ? "Kaufen" : "Zu teuer");
      btn.disabled = owned || save.coins < ab.price;
      btn.onclick = () => {
        if(owned || save.coins < ab.price) return;
        save.coins -= ab.price;
        save.ownedAbilities[ab.key] = true;
        persistSave();
        updateHud();
        renderAbilitiesShop();
      };
      row.appendChild(btn);
      wrap.appendChild(row);
    });
  }
  function renderSkinsShop() {
    const grid = document.getElementById("skinGrid");
    grid.innerHTML = "";
    skins.forEach((sk, i) => {
      const owned = !!save.ownedSkins[sk.key];
      const unlockedByBest = sk.bestReq ? save.best >= sk.bestReq : true;
      const item = document.createElement("div");
      item.className = "shopItem";

      const preview = document.createElement("div");
      preview.className = "skinPreview";
      const thumb = document.createElement("div");
      thumb.className = "spriteThumb";
      thumb.style.backgroundImage = "url(" + SPRITE_DATA_URL + ")";
      thumb.style.backgroundSize = (SPRITE_COLS*60) + "px " + (SPRITE_ROWS*60) + "px";
      thumb.style.backgroundPosition = (-sk.sx*60) + "px " + (-sk.sy*60) + "px";
      preview.appendChild(thumb);
      item.appendChild(preview);

      const priceLine = document.createElement("div");
      priceLine.className = "small";
      priceLine.textContent = sk.bestReq ? ("Best " + sk.bestReq) : (sk.price + " Coins");
      item.appendChild(priceLine);

      const btn = document.createElement("button");
      btn.className = "btn";
      btn.style.marginTop = "8px";
      if(owned) {
        btn.textContent = save.equippedSkin === sk.key ? "Ausgewählt" : "Ausrüsten";
        btn.onclick = () => {
          save.equippedSkin = sk.key;
          persistSave();
          renderSkinsShop();
        };
      } else if(sk.bestReq) {
        btn.textContent = unlockedByBest ? "Freischalten" : "Gesperrt";
        btn.disabled = !unlockedByBest;
        btn.onclick = () => {
          if(!unlockedByBest) return;
          save.ownedSkins[sk.key] = true;
          save.equippedSkin = sk.key;
          persistSave();
          renderSkinsShop();
        };
      } else {
        btn.textContent = save.coins >= sk.price ? "Kaufen" : "Zu teuer";
        btn.disabled = save.coins < sk.price;
        btn.onclick = () => {
          if(save.coins < sk.price) return;
          save.coins -= sk.price;
          save.ownedSkins[sk.key] = true;
          save.equippedSkin = sk.key;
          persistSave();
          updateHud();
          renderSkinsShop();
        };
      }
      item.appendChild(btn);
      grid.appendChild(item);
    });
  }
  function openShop() {
    renderSkinsShop();
    renderAbilitiesShop();
    openShopTab("skins");
    openOverlay(overlays.shop);
  }
  document.getElementById("shopBtn").addEventListener("click", openShop);
  document.getElementById("closeShopBtn").addEventListener("click", () => closeOverlay(overlays.shop));
  document.getElementById("shopTabSkins").addEventListener("click", () => openShopTab("skins"));
  document.getElementById("shopTabAbilities").addEventListener("click", () => openShopTab("abilities"));

  // leaderboard
  function renderLbStatus(cfg) {
    const wrap = document.getElementById("lbStatus");
    wrap.innerHTML = "";
    const pill = document.createElement("span");
    pill.className = "pill";
    pill.textContent = lbEnabled(cfg) ? "Online aktiv" : "Noch nicht eingerichtet";
    wrap.appendChild(pill);
  }
  function renderLbTable(top) {
    const wrap = document.getElementById("lbTableWrap");
    if(!top.length) {
      wrap.innerHTML = '<div class="muted" style="margin-top:12px">Noch keine Einträge.</div>';
      return;
    }
    const rows = top.map((r,i)=>`<tr><td>${i+1}</td><td>${r.name}</td><td>${r.score}</td></tr>`).join("");
    wrap.innerHTML = `<table><thead><tr><th>#</th><th>Name</th><th>Score</th></tr></thead><tbody>${rows}</tbody></table>`;
  }
  function openLb() {
    const cfg = loadLbCfg();
    renderLbStatus(cfg);
    if(!lbEnabled(cfg)) {
      renderLbTable([]);
      openOverlay(overlays.lb);
      return;
    }
    lbFetchTop(cfg, function(err, top) {
      if(err) {
        document.getElementById("lbTableWrap").innerHTML = '<div class="muted" style="margin-top:12px">Fehler: ' + (err.message||String(err)) + '</div>';
      } else {
        renderLbTable(top);
      }
      openOverlay(overlays.lb);
    });
  }
  document.getElementById("lbBtn").addEventListener("click", openLb);
  document.getElementById("closeLbBtn").addEventListener("click", () => closeOverlay(overlays.lb));
  document.getElementById("setupBtn").addEventListener("click", () => openOverlay(overlays.setup));
  document.getElementById("closeSetupBtn").addEventListener("click", () => closeOverlay(overlays.setup));

  const sbUrl = document.getElementById("sbUrl");
  const sbKey = document.getElementById("sbKey");
  const setupHint = document.getElementById("setupHint");
  const cfg0 = loadLbCfg();
  if(cfg0) { sbUrl.value = cfg0.url; sbKey.value = cfg0.key; }

  document.getElementById("saveSetupBtn").addEventListener("click", () => {
    const url = sbUrl.value.trim(), key = sbKey.value.trim();
    if(!url || !key) {
      setupHint.textContent = "Bitte URL und Key eingeben.";
      return;
    }
    saveLbCfg(url, key);
    setupHint.textContent = "Gespeichert ✅";
    renderLbStatus(loadLbCfg());
  });
  document.getElementById("copyShareBtn").addEventListener("click", async () => {
    const url = sbUrl.value.trim(), key = sbKey.value.trim();
    if(!url || !key) {
      setupHint.textContent = "Bitte URL und Key eingeben.";
      return;
    }
    saveLbCfg(url, key);
    const u = new URL(location.href);
    u.searchParams.set("sb_url", url);
    u.searchParams.set("sb_key", key);
    const link = u.toString();
    try {
      await navigator.clipboard.writeText(link);
      setupHint.textContent = "Share-Link kopiert ✅";
    } catch(_) {
      prompt("Kopiere diesen Link und schick ihn deinem Freund:", link);
      setupHint.textContent = "Link anzeigen ✅";
    }
  });

  let lastTs = performance.now();
  updateHud();
  if(!save.name) overlays.start.classList.add("show");

  function loop(ts) {
    const dt = Math.min(0.033, (ts - lastTs) / 1000);
    lastTs = ts;

    if(state.running && !state.paused) {
      sprintCd = Math.max(0, sprintCd - dt);
      shieldCd = Math.max(0, shieldCd - dt);
      teleportCd = Math.max(0, teleportCd - dt);
      dashCd = Math.max(0, dashCd - dt);
      sprintTimer = Math.max(0, sprintTimer - dt);
      shieldTimer = Math.max(0, shieldTimer - dt);
      dashTimer = Math.max(0, dashTimer - dt);

      const shiftPressed = !!keys["shift"];
      const qPressed = !!keys["q"];
      const ePressed = !!keys["e"];
      const spacePressed = !!keys[" "];

      if(save.ownedAbilities.sprint && shiftPressed && !state.prevAbilityKeys.shift && sprintCd<=0) {
        sprintTimer = 3; sprintCd = 8;
      }
      if(save.ownedAbilities.shield && qPressed && !state.prevAbilityKeys.q && shieldCd<=0) {
        shieldTimer = 2; shieldCd = 12;
      }
      if(save.ownedAbilities.teleport && ePressed && !state.prevAbilityKeys.e && teleportCd<=0) {
        teleportCd = 6;
        const dirX = ((keys["d"]||keys["arrowright"])?1:0) - ((keys["a"]||keys["arrowleft"])?1:0);
        const dirY = ((keys["s"]||keys["arrowdown"])?1:0) - ((keys["w"]||keys["arrowup"])?1:0);
        const dl = Math.hypot(dirX,dirY) || 1;
        player.x += (dirX/dl) * 90;
        player.y += (dirY/dl) * 90;
      }
      if(save.ownedAbilities.dash && spacePressed && !state.prevAbilityKeys.space && dashCd<=0) {
        dashTimer = 0.18; dashCd = 2.5;
      }
      state.prevAbilityKeys.shift = shiftPressed;
      state.prevAbilityKeys.q = qPressed;
      state.prevAbilityKeys.e = ePressed;
      state.prevAbilityKeys.space = spacePressed;

      const vx = ((keys["d"]||keys["arrowright"])?1:0) - ((keys["a"]||keys["arrowleft"])?1:0);
      const vy = ((keys["s"]||keys["arrowdown"])?1:0) - ((keys["w"]||keys["arrowup"])?1:0);
      let moveSpeed = player.speed * (sprintTimer>0 ? 1.7 : 1) * (dashTimer>0 ? 2.2 : 1);
      let nx = player.x, ny = player.y;
      if(vx || vy) {
        const len = Math.hypot(vx,vy) || 1;
        nx += (vx/len) * moveSpeed * dt;
        ny += (vy/len) * moveSpeed * dt;
      }
      nx = clamp(nx, player.r, WORLD_W-player.r);
      ny = clamp(ny, player.r, WORLD_H-player.r);
      const moved = moveCircleWithBlocks(nx, ny, player.r);
      player.x = moved.x; player.y = moved.y;

      state.enemySpawnTimer += dt;
      if(state.enemySpawnTimer >= state.enemySpawnEvery) {
        state.enemySpawnTimer = 0;
        spawnEnemyFromSide();
      }

      for(let i=state.coinEntities.length-1;i>=0;i--) {
        const c = state.coinEntities[i];
        if(dist2(player.x,player.y,c.x,c.y) < (player.r + c.r)*(player.r + c.r)) {
          state.coinEntities.splice(i,1);
          state.coinsCollected += c.value;
          save.coins += c.value;
          while(state.coinEntities.length < state.coinTarget) spawnCoin();
        }
      }

      for(let i=state.enemyEntities.length-1;i>=0;i--) {
        const e = state.enemyEntities[i];
        let nextX = e.x + e.vx * dt;
        let nextY = e.y + e.vy * dt;
        if(nextX < e.r || nextX > WORLD_W-e.r) { e.vx *= -1; nextX = clamp(nextX, e.r, WORLD_W-e.r); }
        if(nextY < e.r || nextY > WORLD_H-e.r) { e.vy *= -1; nextY = clamp(nextY, e.r, WORLD_H-e.r); }
        for(const b of blocks) {
          if(rectCircleOverlap(b.x,b.y,b.w,b.h,nextX,nextY,e.r)) {
            const prevX = e.x, prevY = e.y;
            if(!rectCircleOverlap(b.x,b.y,b.w,b.h,prevX,nextY,e.r)) e.vy *= -1;
            else if(!rectCircleOverlap(b.x,b.y,b.w,b.h,nextX,prevY,e.r)) e.vx *= -1;
            else { e.vx *= -1; e.vy *= -1; }
            nextX = e.x + e.vx * dt;
            nextY = e.y + e.vy * dt;
          }
        }
        e.x = nextX; e.y = nextY;
        const sp = e.speed || Math.hypot(e.vx,e.vy);
        const vl = Math.hypot(e.vx,e.vy) || 1;
        e.vx = (e.vx/vl) * sp; e.vy = (e.vy/vl) * sp;

        if(inKillZone(e.x,e.y,e.r)) {
          state.enemyEntities.splice(i,1);
          continue;
        }

        if(dist2(player.x,player.y,e.x,e.y) < (player.r + e.r)*(player.r + e.r)) {
          if(shieldTimer > 0) {
            state.enemyEntities.splice(i,1);
            continue;
          }
          if(save.ownedAbilities.life && !extraLifeUsed) {
            extraLifeUsed = true;
            state.enemyEntities.splice(i,1);
            continue;
          }
          gameOver();
        }
      }

      state.score += dt * 18;
      updateHud();
    }

    const w = canvas.width / dpr();
    const h = canvas.height / dpr();
    ctx.setTransform(dpr(),0,0,dpr(),0,0);
    ctx.clearRect(0,0,w,h);

    const scale = Math.min((w-26)/WORLD_W, (h-26)/WORLD_H);
    const offX = (w - WORLD_W*scale) / 2;
    const offY = (h - WORLD_H*scale) / 2;
    ctx.setTransform(dpr()*scale,0,0,dpr()*scale,dpr()*offX,dpr()*offY);

    ctx.fillStyle = "#0f613b";
    ctx.fillRect(0,0,WORLD_W,WORLD_H);
    ctx.strokeStyle = "rgba(255,255,255,.16)";
    ctx.lineWidth = 3;
    ctx.strokeRect(1.5,1.5,WORLD_W-3,WORLD_H-3);

    ctx.fillStyle = "rgba(0,0,0,.24)";
    for(const z of killZones) ctx.fillRect(z.x,z.y,z.w,z.h);

    ctx.fillStyle = "rgba(8,18,32,.72)";
    for(const b of blocks) ctx.fillRect(b.x,b.y,b.w,b.h);

    for(const c of state.coinEntities) {
      ctx.beginPath();
      ctx.fillStyle = "rgba(243,200,91,.98)";
      ctx.arc(c.x,c.y,c.r,0,Math.PI*2);
      ctx.fill();
      ctx.fillStyle = "rgba(70,45,0,.9)";
      ctx.font = "bold 12px system-ui";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText("C", c.x, c.y+0.5);
    }

    for(const e of state.enemyEntities) {
      ctx.beginPath();
      ctx.fillStyle = "rgba(255,90,90,.92)";
      ctx.arc(e.x,e.y,e.r,0,Math.PI*2);
      ctx.fill();
    }

    ctx.beginPath();
    ctx.fillStyle = "#fff";
    ctx.arc(player.x,player.y,player.r,0,Math.PI*2);
    ctx.fill();
    ctx.lineWidth = 2;
    ctx.strokeStyle = "rgba(0,0,0,.22)";
    ctx.stroke();

    if(SPRITE_DATA_URL && skinImg.complete) {
      const sk = currentSkin();
      const srcX = sk.sx * TILE;
      const srcY = sk.sy * TILE;
      const clipR = player.r - 0.6;
      const d = clipR * 2;
      ctx.save();
      ctx.beginPath();
      ctx.arc(player.x,player.y,clipR,0,Math.PI*2);
      ctx.clip();
      ctx.imageSmoothingEnabled = false;
      ctx.drawImage(skinImg, srcX, srcY, TILE, TILE, player.x-d/2, player.y-d/2, d, d);
      ctx.restore();
    }

    if(shieldTimer > 0) {
      ctx.beginPath();
      ctx.strokeStyle = "rgba(120,180,255,.95)";
      ctx.lineWidth = 3;
      ctx.arc(player.x,player.y,player.r+5,0,Math.PI*2);
      ctx.stroke();
    }

    requestAnimationFrame(loop);
  }

  if(save.name) {
    overlays.start.classList.remove("show");
    setPaused(false);
    state.running = true;
    resetRun();
  } else {
    overlays.start.classList.add("show");
    setPaused(true);
  }

  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
